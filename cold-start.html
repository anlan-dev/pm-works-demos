<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>COLD START · 冷启动行动引擎</title>
  <meta name="description" content="冷启动 · 拖延行动引擎 — 别想了，开始。把拖延变成可执行的第一步。">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  :root{
    --bg:#e6e6e6;--bg2:#dedede;
    --text:#3f3f3f;--text2:#6b6b6b;--text3:#999;
    --accent:#5a6a7a;--accent2:#7a8a6a;--accent3:#8a6a6a;
    --sl:rgba(255,255,255,0.66);--sd:rgba(0,0,0,0.12);--sd2:rgba(0,0,0,0.18);
    --r1:16px;--r2:28px;--r3:32px;--r4:40px;
    --safe-b:env(safe-area-inset-bottom,0px);
  }
  html{scroll-behavior:smooth}
  body{
    background:var(--bg);min-height:100vh;min-height:100dvh;
    font-family:'Inter','Nunito','Noto Sans SC',system-ui,-apple-system,sans-serif;
    color:var(--text);line-height:1.5;-webkit-font-smoothing:antialiased;
    overflow-x:hidden;padding-bottom:calc(72px + var(--safe-b));
  }
  .app{max-width:720px;margin:0 auto;padding:16px 16px 24px}

  /* ===== 新拟物基础 ===== */
  .nr{background:var(--bg);border-radius:var(--r2);box-shadow:-8px -8px 16px var(--sl),8px 8px 16px var(--sd);transition:box-shadow .2s,transform .15s}
  .ni{background:var(--bg);border-radius:var(--r2);box-shadow:inset 4px 4px 8px rgba(0,0,0,.06),inset -4px -4px 8px rgba(255,255,255,.5)}
  .nb{background:var(--bg);border:none;border-radius:var(--r4);padding:14px 28px;font-family:inherit;font-size:.95rem;font-weight:600;color:var(--text);cursor:pointer;display:inline-flex;align-items:center;gap:8px;box-shadow:-5px -5px 12px var(--sl),5px 5px 12px var(--sd);transition:all .2s;user-select:none}
  .nb:hover{box-shadow:-3px -3px 8px var(--sl),3px 3px 8px var(--sd);transform:scale(.98)}
  .nb:active{box-shadow:inset 4px 4px 8px rgba(0,0,0,.08),inset -4px -4px 8px rgba(255,255,255,.4);transform:scale(.97)}
  .nb.accent{color:var(--accent)}
  .nb.danger{color:var(--accent3)}

  /* ===== 底部导航 ===== */
  .tab-bar{
    position:fixed;bottom:0;left:0;right:0;z-index:100;
    background:var(--bg);
    box-shadow:0 -4px 16px rgba(0,0,0,.06);
    display:flex;justify-content:space-around;
    padding:8px 0 calc(8px + var(--safe-b));
  }
  .tab-btn{
    background:none;border:none;cursor:pointer;
    display:flex;flex-direction:column;align-items:center;gap:4px;
    padding:6px 16px;border-radius:var(--r2);transition:all .2s;
    color:var(--text3);font-size:.7rem;font-family:inherit;font-weight:500;
  }
  .tab-btn.active{color:var(--text)}
  .tab-btn.active .tab-icon-wrap{box-shadow:inset 3px 3px 6px rgba(0,0,0,.07),inset -3px -3px 6px rgba(255,255,255,.45)}
  .tab-icon-wrap{
    width:40px;height:40px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    box-shadow:-3px -3px 7px var(--sl),3px 3px 7px var(--sd);
    transition:all .2s;
  }
  .tab-icon-wrap svg{width:20px;height:20px;stroke-width:2}
  .tab-label{letter-spacing:.5px}

  /* ===== Header ===== */
  .hdr{display:flex;align-items:center;justify-content:space-between;padding:8px 0 20px}
  .hdr-l{display:flex;align-items:center;gap:12px}
  .hdr-logo{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.2rem}
  .hdr-title{font-size:1.15rem;font-weight:700;letter-spacing:2px}
  .hdr-sub{font-size:.68rem;color:var(--text2);letter-spacing:.5px}

  /* ===== Tab页面 ===== */
  .tab-page{display:none}
  .tab-page.active{display:block}

  /* ===== 冷启动页 ===== */
  .tagline{text-align:center;margin:8px 0 28px}
  .tagline .q{font-size:clamp(1.2rem,5vw,1.6rem);font-weight:300;letter-spacing:1px}
  .tagline .qe{font-size:.78rem;color:var(--text2);margin-top:4px}
  .input-area{margin-bottom:24px}
  .input-area textarea{width:100%;padding:18px 20px;border:none;background:transparent;font-family:inherit;font-size:1rem;color:var(--text);resize:none;outline:none;line-height:1.6}
  .input-area textarea::placeholder{color:var(--text3);font-weight:300}
  .launch-row{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-top:12px}
  .launch-meta{display:flex;align-items:center;gap:8px;flex-shrink:0}
  .char-hint{font-size:.75rem;color:var(--text3)}
  .btn-launch{background:var(--bg);border:none;border-radius:var(--r4);padding:16px 36px;font-family:inherit;font-size:1.05rem;font-weight:700;color:var(--text);cursor:pointer;display:inline-flex;align-items:center;gap:10px;box-shadow:-8px -8px 18px var(--sl),8px 8px 18px var(--sd);transition:all .2s;letter-spacing:1px;white-space:nowrap}
  .btn-launch:hover{box-shadow:-5px -5px 12px var(--sl),5px 5px 12px var(--sd);transform:scale(.98)}
  .btn-launch:active{box-shadow:inset 5px 5px 10px rgba(0,0,0,.08),inset -5px -5px 10px rgba(255,255,255,.4);transform:scale(.97)}
  .btn-launch.busy{box-shadow:inset 5px 5px 10px rgba(0,0,0,.08),inset -5px -5px 10px rgba(255,255,255,.4);cursor:wait;opacity:.85}
  @keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-6px)}40%,80%{transform:translateX(6px)}}
  .shake{animation:shake .4s}
  @keyframes dots{0%,80%,100%{opacity:.3;transform:scale(.8)}40%{opacity:1;transform:scale(1.1)}}
  .ldots{display:inline-flex;gap:4px}.ldots i{display:block;width:6px;height:6px;border-radius:50%;background:var(--text3);animation:dots 1.2s ease infinite}.ldots i:nth-child(2){animation-delay:.2s}.ldots i:nth-child(3){animation-delay:.4s}

  /* ===== 结果区块 ===== */
  .result{display:none;flex-direction:column;gap:24px}
  .sec{display:none;opacity:0;transform:translateY(14px);transition:opacity .4s,transform .4s}
  .sec.vis{opacity:1;transform:translateY(0)}
  .sec-title{font-size:.82rem;font-weight:600;color:var(--text2);letter-spacing:2px;text-transform:uppercase;margin-bottom:14px;display:flex;align-items:center;gap:8px}
  .sec-title svg{width:16px;height:16px;color:var(--text3)}

  /* 诊断 */
  .diag-card{padding:24px}
  .diag-item{display:flex;gap:10px;padding:12px 0;align-items:flex-start}
  .diag-item+.diag-item{border-top:1px solid rgba(0,0,0,.04)}
  .diag-m{color:var(--accent);font-size:1.1rem;margin-top:1px;flex-shrink:0}
  .diag-t{font-size:.95rem;line-height:1.7}

  /* 启动任务 */
  .start-card{padding:24px}
  .start-name{font-size:1.15rem;font-weight:600;line-height:1.5;margin-bottom:8px}
  .start-time{display:inline-flex;align-items:center;gap:6px;font-size:.8rem;color:var(--text3);padding:5px 14px;border-radius:var(--r4);box-shadow:inset 2px 2px 4px rgba(0,0,0,.04),inset -2px -2px 4px rgba(255,255,255,.4)}
  .start-tip{font-size:.88rem;color:var(--text2);font-style:italic;line-height:1.6;margin-top:10px}

  /* 计划步骤 */
  .steps{display:flex;flex-direction:column;gap:10px}
  .step{padding:18px 20px;display:flex;align-items:center;gap:14px;cursor:pointer}
  .step:hover{box-shadow:-4px -4px 10px var(--sl),4px 4px 10px var(--sd)}
  .step.done{box-shadow:inset 3px 3px 6px rgba(0,0,0,.06),inset -3px -3px 6px rgba(255,255,255,.4)}
  .step.done .step-txt{text-decoration:line-through;color:var(--text3)}
  .step-num{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.82rem;font-weight:700;color:var(--text2);flex-shrink:0;box-shadow:-3px -3px 7px var(--sl),3px 3px 7px var(--sd);transition:all .2s}
  .step.done .step-num{box-shadow:inset 2px 2px 4px rgba(0,0,0,.06),inset -2px -2px 4px rgba(255,255,255,.4);color:var(--accent)}
  .step-txt{flex:1;font-size:.92rem;line-height:1.5}
  .step-date{font-size:.72rem;color:var(--text3);margin-top:3px}
  .step-ck{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:inset 3px 3px 6px rgba(0,0,0,.06),inset -3px -3px 6px rgba(255,255,255,.4)}
  .step-ck svg{width:15px;height:15px;color:transparent;transition:color .2s}
  .step.done .step-ck svg{color:var(--accent)}
  .step-actions{display:flex;gap:6px;flex-shrink:0}
  .step-act{width:28px;height:28px;border-radius:50%;border:none;background:var(--bg);cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text3);box-shadow:-2px -2px 5px var(--sl),2px 2px 5px var(--sd);transition:all .15s;font-size:.72rem}
  .step-act:hover{box-shadow:inset 2px 2px 4px rgba(0,0,0,.06),inset -2px -2px 4px rgba(255,255,255,.4)}
  .step-act.del:hover{color:var(--accent3)}
  .add-step-bar{padding:14px 20px;cursor:pointer;color:var(--text3);font-size:.85rem;display:flex;align-items:center;justify-content:center;gap:6px;transition:all .2s}
  .add-step-bar:hover{box-shadow:-3px -3px 7px var(--sl),3px 3px 7px var(--sd);color:var(--text)}
  .ai-adjust-bar{margin-top:16px;padding:16px;border-radius:var(--r2);box-shadow:inset 3px 3px 6px rgba(0,0,0,.06),inset -3px -3px 6px rgba(255,255,255,.45);display:flex;gap:8px;align-items:center}
  .ai-adjust-bar input{flex:1;border:none;background:transparent;font-family:inherit;font-size:.88rem;color:var(--text);outline:none}
  .ai-adjust-bar button{padding:8px 16px;border:none;border-radius:var(--r1);background:var(--bg);color:var(--accent);cursor:pointer;font-family:inherit;font-size:.82rem;font-weight:600;box-shadow:-2px -2px 5px var(--sl),2px 2px 5px var(--sd);transition:all .15s;white-space:nowrap}
  .ai-adjust-bar button:hover{box-shadow:inset 2px 2px 4px rgba(0,0,0,.06),inset -2px -2px 4px rgba(255,255,255,.4)}
  .ai-adjust-bar button:disabled{opacity:.4;cursor:default}
  .step-edit-form{padding:14px 20px;display:flex;flex-wrap:wrap;gap:8px;align-items:center}
  .step-edit-form input{border:none;background:var(--bg);font-family:inherit;font-size:.88rem;color:var(--text);outline:none;border-radius:var(--r1);padding:8px 12px;box-shadow:inset 2px 2px 4px rgba(0,0,0,.06),inset -2px -2px 4px rgba(255,255,255,.45)}
  .step-edit-form .s-name{flex:1;min-width:120px}
  .step-edit-form .s-dur{width:70px}
  .step-edit-form .s-date{width:130px}
  .step-edit-form button{border:none;border-radius:var(--r1);background:var(--bg);cursor:pointer;font-family:inherit;font-size:.78rem;padding:8px 14px;font-weight:600;box-shadow:-2px -2px 5px var(--sl),2px 2px 5px var(--sd);transition:all .15s}
  .step-edit-form button:hover{box-shadow:inset 2px 2px 4px rgba(0,0,0,.06),inset -2px -2px 4px rgba(255,255,255,.4)}

  /* ===== 任务页 ===== */
  .task-header{display:flex;align-items:center;justify-content:space-between;padding:8px 0 16px}
  .task-header h2{font-size:1.2rem;font-weight:600}
  .task-header-btns{display:flex;gap:8px;flex-shrink:0}
  .task-tabs{display:flex;gap:8px;margin-bottom:16px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;padding:2px}
  .task-tabs::-webkit-scrollbar{display:none}
  .task-tab{padding:8px 18px;border-radius:var(--r4);font-size:.82rem;font-weight:500;cursor:pointer;white-space:nowrap;border:none;background:var(--bg);color:var(--text3);box-shadow:-3px -3px 7px var(--sl),3px 3px 7px var(--sd);transition:all .2s;font-family:inherit}
  .task-tab.active{box-shadow:inset 3px 3px 6px rgba(0,0,0,.07),inset -3px -3px 6px rgba(255,255,255,.45);color:var(--text)}
  .day-group{margin-bottom:20px}
  .day-label{font-size:.78rem;font-weight:600;color:var(--text2);letter-spacing:1px;padding:0 4px;margin-bottom:10px;display:flex;align-items:center;gap:8px}
  .day-label .today-dot{width:6px;height:6px;border-radius:50%;background:var(--accent)}
  .task-item{padding:16px 18px;margin-bottom:8px;display:flex;align-items:center;gap:12px;cursor:pointer}
  .task-ck{width:28px;height:28px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;box-shadow:inset 3px 3px 6px rgba(0,0,0,.06),inset -3px -3px 6px rgba(255,255,255,.4);transition:all .2s}
  .task-ck svg{width:14px;height:14px;color:transparent;transition:color .2s}
  .task-item.done .task-ck svg{color:var(--accent)}
  .task-item.done .task-name{text-decoration:line-through;color:var(--text3)}
  .task-body{flex:1;min-width:0}
  .task-name{font-size:.92rem;font-weight:500;line-height:1.4;transition:all .2s}
  .task-meta{display:flex;align-items:center;gap:8px;margin-top:3px;font-size:.72rem;color:var(--text3)}
  .task-tag{padding:2px 8px;border-radius:20px;box-shadow:inset 1px 1px 3px rgba(0,0,0,.04),inset -1px -1px 3px rgba(255,255,255,.35);font-size:.68rem;color:var(--text2)}
  .task-del{width:28px;height:28px;border-radius:50%;border:none;background:var(--bg);cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text3);box-shadow:-2px -2px 5px var(--sl),2px 2px 5px var(--sd);transition:all .15s;flex-shrink:0;opacity:.35;pointer-events:auto}
  .task-item:hover .task-del{opacity:1}
  .task-del:hover{color:var(--accent3);box-shadow:inset 2px 2px 4px rgba(0,0,0,.06),inset -2px -2px 4px rgba(255,255,255,.4)}
  .task-del svg{width:14px;height:14px}

  /* 新增任务弹窗 */
  .modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.18);backdrop-filter:blur(2px);z-index:200;display:none;align-items:flex-end;justify-content:center}
  .modal-bg.show{display:flex}
  .modal{background:var(--bg);border-radius:var(--r3) var(--r3) 0 0;padding:24px 20px calc(24px + var(--safe-b));width:100%;max-width:500px;max-height:80vh;overflow-y:auto;box-shadow:0 -8px 30px rgba(0,0,0,.12);animation:slideUp .25s ease}
  @keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
  .modal h3{font-size:1.1rem;font-weight:600;margin-bottom:16px}
  .modal label{display:block;font-size:.82rem;font-weight:500;color:var(--text2);margin-bottom:6px;margin-top:14px}
  .modal label:first-of-type{margin-top:0}
  .modal input,.modal select{width:100%;padding:12px 16px;border:none;font-family:inherit;font-size:.92rem;color:var(--text);border-radius:var(--r1);box-shadow:inset 3px 3px 6px rgba(0,0,0,.06),inset -3px -3px 6px rgba(255,255,255,.45);outline:none;background:var(--bg)}
  .modal input:focus{box-shadow:inset 4px 4px 8px rgba(0,0,0,.08),inset -4px -4px 8px rgba(255,255,255,.4)}
  .modal-actions{display:flex;gap:10px;margin-top:20px}
  .modal-actions .nb{flex:1;justify-content:center}

  /* 进度页 */
  .prog-header{padding:8px 0 16px}
  .prog-header h2{font-size:1.2rem;font-weight:600}
  .prog-summary{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px}
  .prog-stat{padding:18px 12px;text-align:center}
  .prog-stat .num{font-size:1.6rem;font-weight:700;color:var(--text)}
  .prog-stat .lbl{font-size:.72rem;color:var(--text3);margin-top:4px}
  .prog-card{padding:20px;margin-bottom:12px}
  .prog-card-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
  .prog-card-title{font-size:.95rem;font-weight:600}
  .prog-card-pct{font-size:.82rem;color:var(--text2);font-weight:600}
  .prog-bar{height:8px;border-radius:4px;box-shadow:inset 2px 2px 4px rgba(0,0,0,.06),inset -2px -2px 4px rgba(255,255,255,.4);overflow:hidden}
  .prog-bar-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--accent),var(--accent2));transition:width .5s}
  .prog-date{font-size:.72rem;color:var(--text3);margin-top:6px}

  /* 历史 */
  .hist{margin-top:8px}
  .hist-title{font-size:.82rem;font-weight:600;color:var(--text2);letter-spacing:2px;margin-bottom:12px;display:flex;align-items:center;gap:8px}
  .hist-title svg{width:16px;height:16px;color:var(--text3)}
  .hist-item{padding:18px 20px;margin-bottom:10px;cursor:pointer}
  .hist-item:hover{box-shadow:-5px -5px 12px var(--sl),5px 5px 12px var(--sd)}
  .hist-item:active{box-shadow:inset 3px 3px 6px rgba(0,0,0,.06),inset -3px -3px 6px rgba(255,255,255,.4)}
  .hist-goal{font-size:.95rem;font-weight:500;margin-bottom:8px}
  .hist-bar{height:6px;border-radius:3px;box-shadow:inset 2px 2px 4px rgba(0,0,0,.05),inset -2px -2px 4px rgba(255,255,255,.4);overflow:hidden;margin-bottom:6px}
  .hist-bar-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--accent),var(--accent2));transition:width .5s}
  .hist-meta{font-size:.72rem;color:var(--text3)}
  .hist-item.done-all .hist-goal{color:var(--text3);text-decoration:line-through}

  .empty{padding:32px;text-align:center;color:var(--text3);font-size:.9rem;font-style:italic}

  /* Footer badge */
  .footer-badge{position:fixed;bottom:calc(68px + var(--safe-b));right:12px;display:flex;flex-direction:column;align-items:flex-end;gap:2px;font-size:.7rem;color:var(--text3);opacity:.4;transition:opacity .3s;z-index:10;pointer-events:none}
  .footer-badge:hover{opacity:.7}
  .footer-badge a{color:var(--text3);text-decoration:none;pointer-events:auto}
  .footer-badge a:hover{text-decoration:underline}
  @media(min-width:768px){.footer-badge{bottom:12px;right:16px}}

  /* Toast */
  .toast{position:fixed;bottom:calc(80px + var(--safe-b));left:50%;transform:translateX(-50%) translateY(60px);background:var(--text);color:var(--bg);padding:10px 24px;border-radius:var(--r4);font-size:.88rem;font-weight:500;z-index:999;opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap;box-shadow:0 8px 24px rgba(0,0,0,.15)}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

  /* ===== 响应式：小屏手机 ≤420px ===== */
  @media(max-width:420px){
    .app{padding:12px 12px 20px}
    .hdr{padding:4px 0 14px}
    .hdr-logo{width:34px;height:34px;font-size:1rem}
    .hdr-title{font-size:1rem;letter-spacing:1px}
    .hdr-sub{font-size:.62rem}
    .hdr button{padding:8px 10px!important}
    .tagline .q{font-size:clamp(1.1rem,6vw,1.4rem)}
    .tagline .qe{font-size:.72rem}
    .tagline{margin:4px 0 18px}
    .input-area textarea{padding:14px 16px;font-size:.92rem;min-height:80px}
    .launch-row{flex-direction:column;align-items:stretch;gap:10px}
    .btn-launch{justify-content:center;padding:14px 24px;font-size:.95rem}
    .launch-meta{justify-content:center}
    .task-header{flex-wrap:wrap;gap:8px;padding:4px 0 12px}
    .task-header h2{width:100%;font-size:1.05rem}
    .task-header-btns{width:100%}
    .task-header-btns .nb{padding:8px 14px!important;font-size:.78rem!important}
    .task-tabs{gap:6px;margin-bottom:12px}
    .task-tab{padding:7px 14px;font-size:.78rem}
    .task-item{padding:14px 14px;gap:10px}
    .task-name{font-size:.88rem}
    .task-meta{font-size:.68rem}
    .step{padding:14px 14px;gap:10px}
    .step-num{width:30px;height:30px;font-size:.75rem}
    .step-txt{font-size:.88rem}
    .step-date{font-size:.68rem}
    .step-ck{width:26px;height:26px}
    .step-ck svg{width:13px;height:13px}
    .step-actions{gap:4px}
    .step-act{width:24px;height:24px;font-size:.65rem}
    .add-step-bar{padding:12px 14px;font-size:.82rem}
    .ai-adjust-bar{flex-direction:column;gap:8px;padding:12px}
    .ai-adjust-bar input{width:100%;font-size:.85rem;padding:10px 0}

    .step-edit-form .s-name{min-width:100%}
    .step-edit-form .s-dur{width:100%}
    .step-edit-form .s-date{width:100%}
    .step-edit-form button{padding:10px 14px;font-size:.78rem}
    .diag-card{padding:18px}
    .diag-item{padding:10px 0}
    .diag-t{font-size:.9rem}
    .start-card{padding:18px}
    .start-name{font-size:1.05rem}
    .prog-summary{grid-template-columns:repeat(3,1fr);gap:8px}
    .prog-stat{padding:14px 8px}
    .prog-stat .num{font-size:1.3rem}
    .prog-stat .lbl{font-size:.65rem}
    .prog-card{padding:16px}
    .prog-card-title{font-size:.88rem}
    .hist-item{padding:14px 16px}
    .hist-goal{font-size:.9rem}
    .modal{padding:20px 16px calc(20px + var(--safe-b));max-height:90vh}
    .modal h3{font-size:1rem;margin-bottom:12px}
    .modal label{font-size:.78rem;margin-top:10px}
    .modal input,.modal select{padding:10px 14px;font-size:.88rem}

  /* ===== 响应式：标准手机 421-767px ===== */

  /* ===== Dark Theme ===== */

</head>

<script>
// ============================================================
//  动态拖延诊断引擎
// ============================================================
function extractKeywords(text) {
  const t = text.toLowerCase();
  const words = [];
  const patterns = [
    {re:/(学|学习|练|教程|看书|阅读|背|考|复习|python|javascript|code|编程|乐器|画画|设计|写作|英语|日语|法语|韩语|雅思|托福|考研)/, cat:'learning'},
    {re:/(健身|跑步|运动|减[肥重]|瘦|增肌|身材|瑜伽|游泳|跑|走路|拉伸|跳绳|hiking|登山|球类)/, cat:'fitness'},
    {re:/(项目|开发|创建|搭建|启动|做.{0,3}(一个|个)|app|网站|工具|平台|系统|软件|产品|小程序|程序|saas)/, cat:'project'},
    {re:/(副业|赚钱|卖|电商|店铺|创业|兼职|收入|接单|生意|投资|理财|freelance|mvp)/, cat:'business'},
    {re:/(习惯|早起|早睡|喝水|冥想|日记|每天|坚持|规律|自律|戒|少看|少玩|番茄|专注|断网|手机)/, cat:'habit'},
    {re:/(社交|交朋友|认识|约|聚会|脱单|恋爱|沟通|表达|演讲|面试|人脉|networking|团队|leader|汇报)/, cat:'social'},
    {re:/(创作|画|设计|拍|录|视频|音乐|歌|故事|小说|文章|blog|自媒体|vlog|剪辑|摄影|手账|手工|插画)/, cat:'creative'},
    {re:/(搬家|整理|打扫|收拾|断舍离|换工作|辞职|旅行|签证|注册|体检|看牙|修|租房|搬家)/, cat:'life'}
  ];
  for (const p of patterns) { if (p.re.test(t)) words.push(p.cat); }
  return words;
}

function extractSubject(text) {
  let s = text.replace(/^(我想|我要|我打算|我准备|我希望|我想要|我应该|我需要|我好想|我很想)/, '');
  s = s.replace(/^(去|来|开始|学会|做好|搞好|弄|搞)/, '');
  s = s.replace(/[。，、！？,.!?]$/g, '');
  return s.trim() || text;
}

function buildDiagnosis(text, cats) {
  const subject = extractSubject(text);
  const lines = [];

  if (cats.includes('learning')) {
    const pool = [
      `你说你想学"${subject}"——但你真正怕的不是学不会，是学了没用。先别想"有用"，先打开看 5 分钟。`,
      `"${subject}"这件事，你已经在脑子里规划了无数遍。但大脑不会替你记住知识，只有手会。现在打开第一页。`,
      `你对"${subject}"的了解已经超过了90%从未开始的人。你的问题不是知识量，是行动量。`,
      `你收藏了那么多"${subject}"的教程——但收藏不等于学过。关掉收藏夹，只留一个，今天就看。`,
      `学"${subject}"最大的敌人不是难度，是你总觉得要"准备好"才开始。你永远不会准备好。现在就开始。`
    ];
    lines.push(pool[Math.floor(Math.random()*pool.length)]);
  }
  if (cats.includes('fitness')) {
    const pool = [
      `你不需要一个完美的健身计划。你需要今天换上鞋出门走10分钟。计划是拖延的高级形式。`,
      `你在等一个"准备好"的时刻——但身体不会准备好去受苦。接受不舒服，然后动起来。`,
      `你把"${subject}"想得太重了。任何让你心跳加快的动作都算数。走路也算。现在就去。`,
      `你收藏了50个健身视频，但身体不知道"收藏"是什么意思。它只知道动没动。`,
      `别等"有时间"——你永远不会"有时间"。你会做出时间。今天10分钟。`
    ];
    lines.push(pool[Math.floor(Math.random()*pool.length)]);
  }
  if (cats.includes('project')) {
    const pool = [
      `"${subject}"——你不是缺技术，你是缺第一行代码。别设计了，打开编辑器。`,
      `你的"${subject}"已经想了太远了。砍掉80%的功能，今天只做一个丑陋但能跑的东西。`,
      `你在等一个完美的架构——但所有伟大的项目都是从一个烂原型开始的。先让它存在。`,
      `你画了30页原型，但用户不需要原型。他们需要一个能点的按钮。先做一个能点的东西。`,
      `"${subject}"不需要完美发布，它需要今天存在。先做出来，再优化。`
    ];
    lines.push(pool[Math.floor(Math.random()*pool.length)]);
  }
  if (cats.includes('business')) {
    const pool = [
      `你不是缺好点子，你是怕赚不到钱被人笑。先赚到第一块钱——哪怕只有一块。`,
      `你在等"时机成熟"——但商业的本质是试错，不是等待。先找一个人，卖一次。`,
      `你把门槛想太高了。今天你能帮一个人解决一个小问题，你就是一个商人。`,
      `你的商业计划写了50页，但没有一个人为它付过一毛钱。先验证，再完善。`,
      `别怕亏。你最大的亏损是把时间花在"想"上面，一分钱都没有进来。`
    ];
    lines.push(pool[Math.floor(Math.random()*pool.length)]);
  }
  if (cats.includes('habit')) {
    const pool = [
      `你不需要自律，你需要降低启动成本。把目标缩小到不需要意志力的程度。`,
      `你说了一百次"从明天开始"。今天就是你昨天的"明天"。`,
      `真正的习惯不需要"坚持"——它需要小到不需要坚持。今天只做一次。`,
      `你把"坚持"想成了意志力的对抗。但最好的习惯是降低到不需要对抗。`,
      `"${subject}"——别想21天，先想今天。今天做了，明天的事明天再说。`
    ];
    lines.push(pool[Math.floor(Math.random()*pool.length)]);
  }
  if (cats.includes('social')) {
    const pool = [
      `你不是社恐，你是社懒。你已经分析够多了，现在只需要出现在那里。`,
      `你在等一个"完美开场白"——但大多数人不会记住你说了什么，只会记住你来了。`,
      `社交能力不是天赋，是数据量。你接触的人越多，越知道怎么说话。先去一个。`,
      `你用"我内向"当借口——但内向不等于不行动。你只是害怕评价。评价不会杀死你。`,
      `你在脑中预演了一百次对话——但真实的人比你想象的宽容得多。`
    ];
    lines.push(pool[Math.floor(Math.random()*pool.length)]);
  }
  if (cats.includes('creative')) {
    const pool = [
      `你不是没灵感，你是怕写出来的东西不够好。但"不够好"是编辑的事，不是创作的事。`,
      `创作的敌人不是平庸，是空白。先写出垃圾，再把它变成别的东西。`,
      `你把创作想成了天赋——但"${subject}"就是坐下来动手。动手就行。`,
      `你脑中有一个完美的作品，但现实中的你还没开始。完美只存在于想象中。`,
      `你在等一个完美的开头——但所有伟大的作品都是从一个烂开头开始的。`
    ];
    lines.push(pool[Math.floor(Math.random()*pool.length)]);
  }
  if (cats.includes('life')) {
    const pool = [
      `你不是不知道该怎么做，你是害怕做完之后的结果。但不做=保持现状=确定性痛苦。`,
      `你在等一个"不得不"的时刻——但被动改变永远比主动改变更痛苦。`,
      `"${subject}"——你已经花在"想"上面的时间，比做它需要的时间还长了。`,
      `你把这件事放到了"以后"——但"以后"是个不存在的地方。今天就开始。`,
      `你的待办清单上最旧的那条，就是你最需要今天做的。`
    ];
    lines.push(pool[Math.floor(Math.random()*pool.length)]);
  }

  if (lines.length === 0) {
    const pool = [
      `"${subject}"——你不是不会，你是怕做不好。但"做不好"和"不做"之间，你已经选了更差的那个。`,
      `你缺的不是计划，是第一步。所有计划在执行面前都是幻觉。现在，做一步。`,
      `你已经在脑子里做了一百遍"${subject}"了。现在，做一遍真实的。`,
      `你最大的敌人不是困难，是你脑子里那个说"再等等"的声音。那个声音在骗你。`,
      `你读了很多道理，收藏了很多方法——但你的生活没有因此改变过一个像素。关掉手机，动手。`,
      `拖延不是懒，是恐惧穿上了理性的外衣。识别它，然后绕过它。现在就开始。`
    ];
    lines.push(pool[Math.floor(Math.random()*pool.length)]);
  }

  if (lines.length < 2) {
    const extras = [
      `你已经分析够久了。分析的边际收益已经为负。现在唯一的正确动作是：开始。`,
      `你的大脑在保护你免受"投入后失败"的痛苦。但不开始=确定性失败。选一个痛苦吧。`,
      `你把"${subject}"当成了一个大山——但它只是一连串的小石头。先踢开第一块。`,
      `你知道所有正确的方法，但你一个都没有试过。知道和做到之间，隔着一个你。`,
      `你在等一个"对的时机"——但时机不会来找你。你去找它。现在就是对的时机。`
    ];
    while (lines.length < 2) {
      const e = extras[Math.floor(Math.random()*extras.length)];
      if (!lines.includes(e)) lines.push(e);
    }
  }

  return lines.slice(0, 2);
}

function buildSteps(text, cats) {
  const subject = extractSubject(text);
  const today = new Date();

  const templates = {
    learning: [
      {name:`找到一个最简单的"${subject}"入门资源`, dur:10, day:0},
      {name:`打开它，只看前5分钟或前2页`, dur:10, day:0},
      {name:`记录一个你不懂但觉得有趣的点`, dur:5, day:1},
      {name:`再看5分钟，试着理解昨天那个点`, dur:10, day:1},
      {name:`把学到的东西讲给自己听（或写下来）`, dur:10, day:2},
      {name:`找到一个练习题/小任务，动手做`, dur:20, day:3},
      {name:`回顾这一周：你比第一天多了什么？`, dur:10, day:7}
    ],
    fitness: [
      {name:`换上运动鞋，出门走10分钟`, dur:15, day:0},
      {name:`回来后记录你的感受（不是数据）`, dur:5, day:0},
      {name:`走15分钟，加入1分钟快走`, dur:20, day:1},
      {name:`尝试一个新动作（拉伸/深蹲/跳绳）`, dur:15, day:2},
      {name:`连续运动15分钟不停`, dur:20, day:3},
      {name:`回顾这周，记录变化`, dur:10, day:7}
    ],
    project: [
      {name:`用一句话描述"${subject}"做什么`, dur:5, day:0},
      {name:`打开编辑器，创建一个空白文件`, dur:5, day:0},
      {name:`写下第一行：标题/框架/任何东西`, dur:15, day:0},
      {name:`让它显示点什么（哪怕是一个Hello World）`, dur:20, day:1},
      {name:`加一个你能用的功能（哪怕很小）`, dur:30, day:2},
      {name:`让一个朋友试用，收集反馈`, dur:15, day:5}
    ],
    business: [
      {name:`想一个你能提供的最小服务或产品`, dur:15, day:0},
      {name:`找到一个可能需要它的人`, dur:10, day:1},
      {name:`用最简单的方式告诉他你能帮忙`, dur:15, day:1},
      {name:`收到反馈（不管正面还是负面）`, dur:5, day:2},
      {name:`根据反馈调整你的方案`, dur:20, day:3},
      {name:`找到第二个客户，重复`, dur:15, day:5}
    ],
    habit: [
      {name:`找到"${subject}"的最小版本（小到可笑）`, dur:5, day:0},
      {name:`绑定到已有的行为后面（比如刷牙后）`, dur:5, day:0},
      {name:`今天只做这一次`, dur:5, day:0},
      {name:`第二天再做一次`, dur:5, day:1},
      {name:`第三天：连续3天了，感受一下`, dur:5, day:2},
      {name:`考虑稍微加量（但可以不加）`, dur:5, day:5}
    ],
    social: [
      {name:`找一个低压力的社交场合`, dur:10, day:0},
      {name:`只跟1个人说一句话`, dur:10, day:0},
      {name:`记录这次的感受`, dur:5, day:0},
      {name:`下次再加一个人`, dur:15, day:2},
      {name:`主动发起一次对话`, dur:15, day:4},
      {name:`回顾：你比第一次从容了吗？`, dur:10, day:7}
    ],
    creative: [
      {name:`打开一个空白文档或画布`, dur:5, day:0},
      {name:`写3行或画1个草图（不管多烂）`, dur:15, day:0},
      {name:`关掉它，去做别的事`, dur:0, day:0},
      {name:`明天回来读/看一遍，改一个地方`, dur:10, day:1},
      {name:`再创作一次，不追求完美`, dur:20, day:2},
      {name:`给一个朋友看（勇气测试）`, dur:5, day:5}
    ],
    life: [
      {name:`把"${subject}"写成一句话`, dur:5, day:0},
      {name:`找到其中最容易的一个动作`, dur:5, day:0},
      {name:`做它`, dur:15, day:0},
      {name:`记录做完后的感受`, dur:5, day:0},
      {name:`找到下一步，排进日程`, dur:10, day:1},
      {name:`回顾：你还觉得那么难吗？`, dur:5, day:3}
    ]
  };

  let pool = [];
  for (const c of cats) {
    if (templates[c]) pool = pool.concat(templates[c]);
  }
  if (pool.length === 0) {
    pool = [
      {name:`把你最担心的部分写下来`, dur:10, day:0},
      {name:`找到一个做过"${subject}"的人，问一个具体问题`, dur:15, day:0},
      {name:`用一句话描述你做完后的感受`, dur:5, day:1},
      {name:`设一个10分钟计时器，只做10分钟`, dur:15, day:1},
      {name:`把"我要${subject}"改成"我现在就开始${subject}的第一步"`, dur:5, day:2},
      {name:`告诉一个朋友你打算做什么`, dur:10, day:2},
      {name:`回顾：你已经开始了，这比计划强一万倍`, dur:5, day:5}
    ];
  }

  // 去重并限制数量
  const seen = new Set();
  const unique = pool.filter(s => {
    if (seen.has(s.name)) return false;
    seen.add(s.name);
    return true;
  });
  const selected = unique.slice(0, 5);

  return selected.map((s, i) => {
    const d = new Date(today);
    d.setDate(d.getDate() + s.day);
    const dateStr = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    return {
      id: 'step_' + Date.now() + '_' + i,
      name: s.name,
      duration: s.dur,
      date: dateStr,
      done: false
    };
  });
}

const SK = 'cs_projects';

function getProjects() { try{return JSON.parse(localStorage.getItem(SK))||[]}catch{return[]} }
function saveProjects(p) { try{localStorage.setItem(SK,JSON.stringify(p))}catch{} }

//  冷启动交互
// ============================================================
const goalInput = document.getElementById('goalInput');
const launchBtn = document.getElementById('launchBtn');
const btnLabel = document.getElementById('btnLabel');
const charHint = document.getElementById('charHint');
let currentPid = null;

goalInput.addEventListener('input', function(){ charHint.textContent = this.value.length+'/200'; });
goalInput.addEventListener('keydown', function(e){ if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();handleLaunch()} });

function handleLaunch() {
  const text = goalInput.value.trim();
  if (!text) { goalInput.classList.add('shake'); setTimeout(()=>goalInput.classList.remove('shake'),400); goalInput.focus(); return; }

  launchBtn.classList.add('busy');
  launchBtn.disabled = true;
  btnLabel.innerHTML = '<span class="ldots"><i></i><i></i><i></i></span>';
  hideResults();
  currentPid = 'p_' + Date.now();

  const settings = getSettings();
  if (settings.mode === 'ai' && settings.apiKey) {
    handleLaunchAI(text, settings);
  } else {
    handleLaunchRule(text);
  }
}

function handleLaunchRule(text) {
  const cats = extractKeywords(text);
  const diagnosis = buildDiagnosis(text, cats);
  const steps = buildSteps(text, cats);

  setTimeout(() => {
    launchBtn.classList.remove('busy');
    launchBtn.disabled = false;
    btnLabel.textContent = '冷启动';
    renderResults(text, diagnosis, steps);
    saveProject(text, diagnosis, steps);
    addStepsToTasks(text, steps);
    renderHist();
  }, 1500);
}

let aiAbort = null;
let aiTimer = null;

async function handleLaunchAI(text, settings) {
  const startTime = Date.now();
  aiAbort = new AbortController();
  const autoAbort = setTimeout(() => aiAbort.abort(), 90000);
  aiTimer = setInterval(() => {
    const sec = Math.floor((Date.now() - startTime) / 1000);
    btnLabel.textContent = `等待 AI 响应… ${sec}s`;
  }, 1000);

  launchBtn.onclick = () => { if (aiAbort) { aiAbort.abort(); } };

  try {
    const raw = await callAI(text, settings, aiAbort.signal);
    clearTimeout(autoAbort);
    clearInterval(aiTimer);
    aiTimer = null;
    const { diagnosis, steps } = parseAIResponse(raw);

    if (diagnosis.length === 0) throw new Error('AI 未返回诊断');
    if (steps.length === 0) throw new Error('AI 未返回有效步骤');

    const mappedSteps = steps.map((s, i) => ({
      id: 'step_' + Date.now() + '_' + i,
      name: s.name,
      duration: s.duration || 15,
      date: computeDateStr(s.day != null ? s.day : i),
      done: false
    }));

    launchBtn.classList.remove('busy');
    launchBtn.disabled = false;
    btnLabel.textContent = '冷启动';
    launchBtn.onclick = handleLaunch;
    renderResults(text, diagnosis, mappedSteps);
    saveProject(text, diagnosis, mappedSteps);
    addStepsToTasks(text, mappedSteps);
    renderHist();
  } catch (err) {
    clearTimeout(autoAbort);
    clearInterval(aiTimer);
    aiTimer = null;
    launchBtn.classList.remove('busy');
    launchBtn.disabled = false;
    btnLabel.textContent = '冷启动';
    launchBtn.onclick = handleLaunch;
    if (err.name === 'AbortError') {
      showToast('已取消');
    } else {
      showToast('AI 调用失败：' + (err.message || '未知错误'));
      handleLaunchRule(text);
    }
  }
}

function computeDateStr(dayOffset) {
  const d = new Date();
  d.setDate(d.getDate() + (parseInt(dayOffset) || 0));
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function parseAIResponse(raw) {
  const diagnosis = [];
  const steps = [];

  const clean = raw
    .replace(/\*\*([^*]+)\*\*/g, '$1')
    .replace(/\*([^*]+)\*/g, '$1')
    .replace(/`([^`]+)`/g, '$1')
    .trim();

  const diagMatch = clean.match(/诊断[：:]\s*([\s\S]*?)(?=\n\s*(?:启动任务|后续计划|第一步|第1步)[：:]|\n\s*$)/);
  const startMatch = clean.match(/(?:启动任务|第一步|第1步)[：:]\s*([\s\S]*?)(?=\n\s*(?:后续计划|第二步|接下来|后续)[：:]|\n\s*$)/);
  const planMatch = clean.match(/(?:后续计划|第二步|接下来|后续)[：:]\s*([\s\S]*?)$/);

  if (diagMatch) {
    const diagLines = diagMatch[1].split('\n')
      .map(l => l.trim())
      .filter(l => l.length > 6 && l.length < 200 && !/^[-*\d.]+$/.test(l) && !/^\s*$/.test(l));
    diagnosis.push(...diagLines.slice(0, 2));
  }
  if (diagnosis.length === 0) {
    const fallback = clean.split(/[。\n]/).map(s => s.trim()).filter(s => s.length > 6 && s.length < 120);
    diagnosis.push(...fallback.slice(0, 2));
  }

  const encouragementPatterns = /^(加油|记住|相信|你已经迈出了|你一定|别担心|放轻松|没事|不用怕|不要怕|勇敢|坚持|祝你|希望你|期待你|你是最棒|没问题|别着急|慢慢来|最重要的是)/;
  const headerPatterns = /^(诊断|启动任务|后续计划|你的风格|要求|注意|说明|总结|格式|回复|第一步|第二步|第1步|第2步)/;
  const separatorPatterns = /^[-*_]{3,}$/;
  const emptyOrSymbol = /^[\s\-_*·•▸●①②③④⑤⑥⑦⑧⑨⑩]*$/;

  const taskSections = [];
  if (startMatch) taskSections.push(startMatch[1].trim());
  if (planMatch) taskSections.push(planMatch[1].trim());
  if (taskSections.length === 0) {
    taskSections.push(clean);
  }

  let dayCounter = 0;
  for (const section of taskSections) {
    const lines = section.split('\n').map(l => l.trim()).filter(l => l.length > 2);

    for (const line of lines) {
      if (line.length > 300) continue;
      if (headerPatterns.test(line)) continue;
      if (encouragementPatterns.test(line)) continue;
      if (separatorPatterns.test(line)) continue;
      if (emptyOrSymbol.test(line)) continue;

      let day = dayCounter;
      const bracketDay = line.match(/【([^】]+)】/);
      const inlineDay = line.match(/(今天|明天|后天|第\s*\d+\s*天|Day\s*\d+|\d+\s*天后|本周|下周|今天起|明天起)/i);
      const dayRef = bracketDay ? bracketDay[1] : (inlineDay ? inlineDay[1] : null);
      if (dayRef) {
        if (/今天/.test(dayRef)) day = 0;
        else if (/明天/.test(dayRef)) day = 1;
        else if (/后天/.test(dayRef)) day = 2;
        else { const n = dayRef.match(/\d+/); if (n) day = parseInt(n[0]); }
      }

      const durMatch = line.match(/[（(](\d+)\s*分钟[）)]/);
      const durInline = line.match(/(?:约|大约|大概)?\s*(\d+)\s*分钟/);
      const duration = durMatch ? parseInt(durMatch[1]) : (durInline ? parseInt(durInline[1]) : (day === 0 ? 10 : 20));

      const taskName = line
        .replace(/【[^】]+】/g, '')
        .replace(/[（(][^）)]*分钟[^）)]*[）)]/g, '')
        .replace(/[（(][^）)]*[）)]/g, '')
        .replace(/^\d+\.\s*/, '')
        .replace(/^[-•·▸●]\s*/, '')
        .replace(/花\s*\d+\s*分钟[，,]?\s*/g, '')
        .replace(/预计[：:]?\s*\d+\s*分钟/g, '')
        .replace(/(今天|明天|后天|第\s*\d+\s*天|Day\s*\d+|\d+\s*天后|本周|下周|今天起|明天起)[：:,，\s]*/gi, '')
        .replace(/^约\s*\d+\s*分钟[，,：:]?\s*/g, '')
        .trim();

      if (taskName.length > 3 && taskName.length < 200) {
        steps.push({ name: taskName, duration, day });
        dayCounter = day + 1;
      }
    }
  }

  return { diagnosis, steps };
}

function enrichInput(text) {
  const urlRegex = /(https?:\/\/[^\s，,。.！!？?）)]+)/g;
  const urls = text.match(urlRegex) || [];

  const hints = [];
  if (urls.length > 0) {
    const ghUrls = urls.filter(u => /github\.com/i.test(u));
    const otherUrls = urls.filter(u => !/github\.com/i.test(u));
    if (ghUrls.length > 0) {
      hints.push('用户提供了 GitHub 项目/教程链接，请结合该项目的具体内容（README、目录结构、学习路线）来拆分步骤，不要给通用建议');
    }
    if (otherUrls.length > 0) {
      hints.push('用户提到了外部学习资源/教程链接，请结合这些资源来规划步骤');
    }
  }

  const progressKeywords = [
    { regex: /学到|学完|看到|读到|做到|完成到|进行到/, hint: '用户已经在学习过程中，请尊重已有进度，从断点处继续' },
    { regex: /正在跟|跟着|按照|照着|参考|基于/, hint: '用户正在跟随某个教程/课程，请围绕该教程的具体章节来拆分' },
    { regex: /基础|零基础|入门|小白|什么都不懂|新手/, hint: '用户自认是初学者，步骤要从最基础开始' },
    { regex: /有一点|学过一些|了解过|大概知道/, hint: '用户有一定基础，可以跳过最基础的内容' },
  ];
  for (const kw of progressKeywords) {
    if (kw.regex.test(text)) hints.push(kw.hint);
  }

  if (hints.length === 0) return text;
  return text + '\n\n[系统补充：' + hints.join('；') + '。请基于以上信息来拆分，给出具体到该资源/教程/项目本身的步骤]';
}

async function callAI(text, settings, signal) {
  let baseUrl, model, headers;
  if (settings.platform === 'openrouter') {
    baseUrl = 'https://openrouter.ai/api/v1/chat/completions';
    model = settings.model || 'deepseek/deepseek-chat-v3-0324:free';
    headers = { 'Content-Type':'application/json', 'Authorization':`Bearer ${settings.apiKey}`, 'HTTP-Referer':'https://coldstart.app', 'X-Title':'ColdStart' };
  } else if (settings.platform === 'deepseek') {
    baseUrl = 'https://api.deepseek.com/v1/chat/completions';
    model = settings.dsModel || 'deepseek-v4-flash';
    headers = { 'Content-Type':'application/json', 'Authorization':`Bearer ${settings.apiKey}` };
  } else if (settings.platform === 'siliconflow') {
    baseUrl = 'https://api.siliconflow.cn/v1/chat/completions';
    model = settings.sfModel || 'Qwen/Qwen2.5-7B-Instruct';
    headers = { 'Content-Type':'application/json', 'Authorization':`Bearer ${settings.apiKey}` };
  } else {
    let rawUrl = settings.customUrl || '';
    if (rawUrl && !rawUrl.includes('/chat/completions')) {
      rawUrl = rawUrl.replace(/\/+$/, '') + '/v1/chat/completions';
    }
    baseUrl = rawUrl;
    model = settings.customModel || 'default';
    headers = { 'Content-Type':'application/json', 'Authorization':`Bearer ${settings.apiKey}` };
  }

  const sysPrompt = `你是一个有温度的行动教练。用户告诉你一件他们想做但一直没开始的事。

你的任务：帮他们看清楚卡在哪里，然后给出一条切实可行的路。

特别注意：
- 如果用户提到了某个教程、课程、项目链接、GitHub 仓库、学习资源，你要认真对待这些信息
- 拆分步骤时要围绕用户提到的具体资源来规划，不要抛开这些资源自己编一套通用计划
- 如果用户说"正在跟XX教程"，说明他们已经有了学习材料，你的任务是帮他们把教程拆成可执行的每日步骤
- 如果用户给了 GitHub 链接，推测这是一个开源项目/教程，按"阅读文档→理解代码→动手实操→独立复现"的逻辑来拆
- 如果用户提到"学到一半""学到了第X章"，要尊重他们的进度，从断点处继续，不要从头开始
- 启动任务要从用户当前的位置出发，不是从零开始

严格按以下格式回复，不要加多余内容，不要用加粗和 markdown 符号：

诊断：
（1-2句话，温柔但精准地说出真正卡住的原因，直接引用用户说的具体内容，不要鸡汤不要说教）

启动任务：
（一个今天就能做的极小动作，5-15分钟，具体到用户看完就知道下一步做什么，要和用户提到的资源直接相关）

后续计划：
【明天】具体步骤名称 （15分钟）
【第3天】具体步骤名称 （20分钟）
【第5天】具体步骤名称 （30分钟）

重要规则：
1. 后续计划中，每个步骤必须是单独一行，一行一个步骤
2. 每行格式：【时间】步骤描述 （时长）
3. 步骤之间不要插入任何额外文字、鼓励语、解释说明
4. 不要用编号、不要用加粗、不要用markdown标记
5. 给出 3-4 个步骤，从小到大，且要和用户提到的具体资源/教程/项目强相关
6. 不要写"加油""相信自己""你可以的"这类话
7. 诊断部分用口语化表达，可以说"说实话""其实""你有没有想过"
8. 像一个既有智慧又有温度的朋友在跟你谈心
9. 步骤描述要具体到用户一看就知道该打开什么、看什么、做什么`;

  const enriched = enrichInput(text);

  const body = {
    model,
    messages: [
      { role: 'system', content: sysPrompt },
      { role: 'user', content: enriched }
    ],
    temperature: 1.0,
    max_tokens: 2000
  };
  if (settings.platform === 'deepseek') {
    body.thinking = { type: 'disabled' };
  }

  const resp = await fetch(baseUrl, {
    method: 'POST',
    headers,
    body: JSON.stringify(body),
    signal
  });

  if (!resp.ok) {
    const errBody = await resp.text().catch(() => '');
    throw new Error(`API ${resp.status}: ${errBody.slice(0, 100)}`);
  }

  const data = await resp.json();
  return data.choices?.[0]?.message?.content || '';
}

        <div class="step-date">${s.date} · ${s.duration} 分钟</div>

function showSec(id, delay) {
  const el = document.getElementById(id);
  setTimeout(()=>{ el.style.display='block'; requestAnimationFrame(()=>el.classList.add('vis')); }, delay);
}

function toggleStep(el) {
  const id = el.dataset.id;
  const tasks = getTasks();
  const t = tasks.find(x=>x.id===id);
  if (t) t.done = !t.done;
  saveTasks(tasks);
  el.classList.toggle('done');
  showToast(t&&t.done ? '✓ 已完成' : '已取消');
  renderTasks();
  renderProgress();
}

function editStep(id) {
  const projects = getProjects();
  const proj = projects.find(p => p.id === currentPid);
  if (!proj) return;
  const step = proj.steps.find(s => s.id === id);
  if (!step) return;

  const stepEl = document.querySelector(`.step[data-id="${id}"]`);
  if (!stepEl) return;
  stepEl.outerHTML =
    `<div class="step-edit-form" data-id="${id}">
       <input class="s-name" value="${step.name.replace(/"/g,'&quot;')}" maxlength="100">
       <input class="s-dur" type="number" value="${step.duration}" min="5" max="240" step="5">
       <input class="s-date" type="date" value="${step.date}">
       <button style="color:var(--accent)" onclick="saveEditStep('${id}')">保存</button>
       <button style="color:var(--text3)" onclick="renderPlanSteps(getProjects().find(p=>p.id===currentPid).steps)">取消</button>
     </div>`;
}

function saveEditStep(id) {
  const form = document.querySelector(`.step-edit-form[data-id="${id}"]`);
  if (!form) return;
  const name = form.querySelector('.s-name').value.trim();
  const duration = parseInt(form.querySelector('.s-dur').value) || 15;
  const date = form.querySelector('.s-date').value;
  if (!name) return;

  const projects = getProjects();
  const proj = projects.find(p => p.id === currentPid);
  if (!proj) return;
  const step = proj.steps.find(s => s.id === id);
  if (!step) return;
  step.name = name;
  step.duration = duration;
  step.date = date;
  saveProjects(projects);

  const tasks = getTasks();
  const task = tasks.find(t => t.id === id);
  if (task) {
    task.name = name;
    task.duration = duration;
    task.date = date;
    saveTasks(tasks);
  }

  renderPlanSteps(proj.steps);
  renderTasks();
  renderProgress();
  showToast('已更新');
}

function deleteStep(id) {
  const projects = getProjects();
  const proj = projects.find(p => p.id === currentPid);
  if (!proj) return;
  const step = proj.steps.find(s => s.id === id);
  if (!step) return;
  if (!confirm(`确定要删除「${step.name}」吗？`)) return;

  proj.steps = proj.steps.filter(s => s.id !== id);
  saveProjects(projects);

  const tasks = getTasks().filter(t => t.id !== id);
  saveTasks(tasks);

  renderPlanSteps(proj.steps);
  renderTasks();
  renderProgress();
  showToast('已删除');
}

function addNewStep() {
  const projects = getProjects();
  const proj = projects.find(p => p.id === currentPid);
  if (!proj) {
    showToast('请先冷启动一个目标');
    return;
  }
  const lastDay = proj.steps.length > 0 ? proj.steps[proj.steps.length - 1].date : computeDateStr(1);
  const nextDate = new Date(lastDay);
  nextDate.setDate(nextDate.getDate() + 2);
  const newDate = `${nextDate.getFullYear()}-${String(nextDate.getMonth()+1).padStart(2,'0')}-${String(nextDate.getDate()).padStart(2,'0')}`;

  const newId = 'step_' + Date.now();
  proj.steps.push({
    id: newId,
    name: '新步骤（点击编辑）',
    duration: 15,
    date: newDate,
    done: false
  });
  saveProjects(projects);

  const tasks = getTasks();
  tasks.push({
    id: newId,
    projectId: currentPid,
    project: proj.goal,
    name: '新步骤（点击编辑）',
    date: newDate,
    duration: 15,
    done: false,
    createdAt: new Date().toISOString()
  });
  saveTasks(tasks);

  renderPlanSteps(proj.steps);
  editStep(newId);
}

async function requestAdjust() {
  const settings = getSettings();
  if (settings.mode !== 'ai' || !settings.apiKey) {
    showToast('请先在设置中配置 AI 模式');
    return;
  }
  const input = document.getElementById('aiAdjustInput');
  const feedback = input.value.trim();
  if (!feedback) { input.focus(); return; }

  const projects = getProjects();
  const proj = projects.find(p => p.id === currentPid);
  if (!proj) return;

  const btn = document.getElementById('aiAdjustBtn');
  btn.disabled = true;
  btn.textContent = '...';

  const planSummary = proj.steps.map((s, i) => `${i+1}. ${s.name}（${s.duration}分钟，${s.date}）`).join('\n');

  const adjustPrompt = `用户有一个目标：「${proj.goal}」
之前的后续计划：
${planSummary}

用户的反馈：${feedback}

请根据反馈重新调整计划，按以下格式回复：

后续计划：
【时间】新步骤名称 （时长）

规则：
1. 一行一个步骤，每行格式：【时间】步骤描述 （时长）
2. 不要加多余文字、鼓励语、编号、加粗
3. 给出 3-4 个步骤`;

  try {
    const aiAbort = new AbortController();
    const autoAbort = setTimeout(() => aiAbort.abort(), 60000);
    const raw = await callAI(adjustPrompt, settings, aiAbort.signal);
    clearTimeout(autoAbort);

    const { steps: newSteps } = parseAIResponse(raw);
    if (newSteps.length === 0) throw new Error('AI 未返回有效步骤');

    const mappedSteps = newSteps.map((s, i) => {
      const existing = proj.steps.find((_, j) => j === i);
      return {
        id: existing ? existing.id : 'step_' + Date.now() + '_' + i,
        name: s.name,
        duration: s.duration || 15,
        date: computeDateStr(s.day != null ? s.day : i + 1),
        done: false
      };
    });

    const removedIds = proj.steps.map(s => s.id).filter(id => !mappedSteps.find(s => s.id === id));
    const tasks = getTasks().filter(t => !removedIds.includes(t.id));

    for (const s of mappedSteps) {
      const existingTask = tasks.find(t => t.id === s.id);
      if (existingTask) {
        existingTask.name = s.name;
        existingTask.duration = s.duration;
        existingTask.date = s.date;
      } else {
        tasks.push({
          id: s.id,
          projectId: currentPid,
          project: proj.goal,
          name: s.name,
          date: s.date,
          duration: s.duration,
          done: false,
          createdAt: new Date().toISOString()
        });
      }
    }
    saveTasks(tasks);

    proj.steps = mappedSteps;
    saveProjects(projects);

    input.value = '';
    renderPlanSteps(proj.steps);
    renderTasks();
    renderProgress();
    showToast('计划已更新 ✓');
  } catch (err) {
    showToast('调整失败：' + (err.message || '请重试'));
  } finally {
    btn.disabled = false;
    btn.textContent = '发送';
  }
}

function saveProject(goal, diagnosis, steps) {
  const projects = getProjects();
  projects.unshift({
    id: currentPid,
    goal,
    diagnosis,
    steps: steps.map(s=>({id:s.id,name:s.name,duration:s.duration,date:s.date})),
    createdAt: new Date().toISOString()
  });
  if (projects.length > 30) projects.length = 30;
  saveProjects(projects);
}

      project: goal,
      name: s.name,
      date: s.date,
      duration: s.duration,
      done: false,
      createdAt: new Date().toISOString()
    });
  }
  saveTasks(tasks);
}

function renderTaskTabs() {

function deleteSelectedProject() {
  if (taskFilter === 'all') return;
  const projects = getProjects();
  const proj = projects.find(p => p.id === taskFilter);
  if (!proj) return;
  deleteProject(proj.id, proj.goal);
  taskFilter = 'all';
  renderTaskTabs();
  renderTasks();
  const delBtn = document.getElementById('delProjectBtn');
  if (delBtn) delBtn.style.display = 'none';
}

function renderTasks() {
  const container = document.getElementById('taskList');
  let tasks = getTasks();
  if (taskFilter !== 'all') tasks = tasks.filter(t => t.projectId === taskFilter);

  if (tasks.length === 0) {
    container.innerHTML = '<div class="empty">还没有任务，去冷启动一个目标吧</div>';
    return;
  }

  const today = new Date();
  today.setHours(0,0,0,0);
  const todayStr = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;

  const groups = {};
  for (const t of tasks) {
    const key = t.date || 'no-date';
    if (!groups[key]) groups[key] = [];
    groups[key].push(t);
  }

  const sortedKeys = Object.keys(groups).sort((a,b) => {
    if (a==='no-date') return 1;
    if (b==='no-date') return -1;
    return a.localeCompare(b);
  });

  let html = '';
  for (const key of sortedKeys) {
    const isToday = key === todayStr;
    const isPast = key < todayStr;
    let label;
    if (key === 'no-date') label = '未安排';
    else if (isToday) label = `<span class="today-dot"></span>今天 · ${formatDate(key)}`;
    else if (isPast) label = `已过期 · ${formatDate(key)}`;
    else label = formatDate(key);

    html += `<div class="day-group"><div class="day-label">${label}</div>`;
    for (const t of groups[key]) {
      html += `<div class="task-item nr ${t.done?'done':''}" onclick="toggleTask('${t.id}')">
        <div class="task-ck"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg></div>
        <div class="task-body">
          <div class="task-name">${t.name}</div>
          <div class="task-meta">
            <span class="task-tag">${t.duration||15} 分钟</span>
            ${t.project?'<span class="task-tag">'+t.project.slice(0,10)+'</span>':''}
          </div>
        </div>
        <button class="task-del" onclick="event.stopPropagation();deleteTask('${t.id}')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
      </div>`;
    }
    html += '</div>';
  }
  container.innerHTML = html;
}

function deleteTask(id) {

}

function saveNewTask() {
  const name = document.getElementById('mName').value.trim();
  if (!name) { document.getElementById('mName').focus(); return; }
  const project = document.getElementById('mProject').value.trim();
  const date = document.getElementById('mDate').value;

function formatDate(str) {
  if (!str || str === 'no-date') return '未安排';
  const d = new Date(str + 'T00:00:00');
  const days = ['日','一','二','三','四','五','六'];
  return `${d.getMonth()+1}月${d.getDate()}日 周${days[d.getDay()]}`;
}

function renderProgress() {
  const projects = getProjects();
  const tasks = getTasks();

  const total = tasks.length;
  const done = tasks.filter(t=>t.done).length;
  const pct = total ? Math.round(done/total*100) : 0;

  document.getElementById('progSummary').innerHTML =
    `<div class="prog-stat nr"><div class="num">${total}</div><div class="lbl">总任务</div></div>
     <div class="prog-stat nr"><div class="num">${done}</div><div class="lbl">已完成</div></div>
     <div class="prog-stat nr"><div class="num">${pct}%</div><div class="lbl">完成率</div></div>`;

  const cards = document.getElementById('progCards');
  if (projects.length === 0) {
    cards.innerHTML = '<div class="empty">还没有项目，去冷启动一个目标吧</div>';
    return;
  }

  cards.innerHTML = projects.map(p => {
    const pTasks = tasks.filter(t=>t.projectId===p.id);
    const pDone = pTasks.filter(t=>t.done).length;
    const pTotal = pTasks.length;
    const pPct = pTotal ? Math.round(pDone/pTotal*100) : 0;
    const created = new Date(p.createdAt);
    return `<div class="prog-card nr">
      <div class="prog-card-head">
        <div class="prog-card-title">${p.goal}</div>
        <div class="prog-card-pct">${pPct}%</div>
      </div>
      <div class="prog-bar"><div class="prog-bar-fill" style="width:${pPct}%"></div></div>
      <div class="prog-date">${created.getMonth()+1}/${created.getDate()} 创建 · ${pDone}/${pTotal} 步完成</div>
    </div>`;
  }).join('');
}

// ============================================================
function renderHist() {
  const projects = getProjects();
  const tasks = getTasks();
  const list = document.getElementById('histList');
  if (projects.length === 0) { list.innerHTML = ''; return; }

  list.innerHTML = projects.map(p => {
    const pTasks = tasks.filter(t=>t.projectId===p.id);
    const pDone = pTasks.filter(t=>t.done).length;
    const pTotal = pTasks.length || p.steps.length;
    const pct = pTotal ? Math.round(pDone/pTotal*100) : 0;
    const created = new Date(p.createdAt);
    const now = new Date();
    const diff = now - created;
    let timeLabel;
    if (diff < 60000) timeLabel = '刚刚';
    else if (diff < 3600000) timeLabel = Math.floor(diff/60000)+' 分钟前';
    else if (diff < 86400000) timeLabel = Math.floor(diff/3600000)+' 小时前';
    else timeLabel = `${created.getMonth()+1}/${created.getDate()}`;

    return `<div class="hist-item nr ${pct>=100?'done-all':''}" style="display:flex;align-items:center;gap:12px">
      <div style="flex:1;min-width:0;cursor:pointer" onclick="reloadProject('${p.id}')">
        <div class="hist-goal">${p.goal}</div>
        <div class="hist-bar"><div class="hist-bar-fill" style="width:${pct}%"></div></div>
        <div class="hist-meta">${timeLabel} · ${pDone}/${pTotal} · ${pct}%</div>
      </div>
      <button class="task-del" style="opacity:.4;pointer-events:auto" onclick="event.stopPropagation();deleteProject('${p.id}','${p.goal.replace(/'/g,"\\'")}')" title="删除">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg>
      </button>
    </div>`;
  }).join('');
}

function deleteProject(id, goal) {
  if (!confirm(`确定要删除「${goal}」吗？\n该项目的所有任务也会一起删除。`)) return;
  const projects = getProjects().filter(p => p.id !== id);
  saveProjects(projects);
  const tasks = getTasks().filter(t => t.projectId !== id);
  saveTasks(tasks);
  if (taskFilter === id) {
    taskFilter = 'all';
    const delBtn = document.getElementById('delProjectBtn');
    if (delBtn) delBtn.style.display = 'none';
  }
  renderHist();
  renderTaskTabs();
  renderTasks();
  renderProgress();
  showToast('已删除');
}

function reloadProject(id) {
  const projects = getProjects();
  const p = projects.find(x=>x.id===id);
  if (!p) return;
  currentPid = p.id;
  goalInput.value = p.goal;
  charHint.textContent = p.goal.length+'/200';
  renderResults(p.goal, p.diagnosis, p.steps);
  switchTab('launch');
  window.scrollTo({top:0,behavior:'smooth'});
}

// ============================================================
//  Tab 切换
// ============================================================
function switchTab(name) {
  document.querySelectorAll('.tab-page').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
  document.getElementById('page-'+name).classList.add('active');
  document.querySelector(`.tab-btn[data-tab="${name}"]`).classList.add('active');

  if (name === 'tasks') { renderTaskTabs(); renderTasks(); }
  if (name === 'progress') renderProgress();
}

// ============================================================
//  工具函数
// ============================================================
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._t);
  t._t = setTimeout(()=>t.classList.remove('show'),1800);
}

function clearAll() {
  if (!confirm('确定要清除所有数据吗？此操作不可撤销。')) return;
  localStorage.removeItem(SK);
  localStorage.removeItem(TK);
  hideResults();
  goalInput.value = '';
  charHint.textContent = '0/200';
  renderHist();
  renderTasks();
  renderProgress();
  showToast('已清除所有数据');
}

function updateModeIndicator() {
  const s = getSettings();
  const indicator = document.getElementById('modeIndicator');
  if (indicator) indicator.textContent = s.mode === 'ai' ? '🤖 AI' : '⚙️ 规则';
}

// ============================================================
//  设置管理
// ============================================================
const SETTINGS_KEY = 'cs_settings';

function getSettings() {
  try {
    const s = JSON.parse(localStorage.getItem(SETTINGS_KEY)) || { mode: 'rule', platform: 'openrouter', model: 'deepseek/deepseek-chat-v3-0324:free' };
    if (s.dsModel === 'deepseek-chat') s.dsModel = 'deepseek-v4-flash';
    if (s.dsModel === 'deepseek-reasoner') s.dsModel = 'deepseek-v4-pro';
    return s;
  } catch { return { mode: 'rule', platform: 'openrouter', model: 'deepseek/deepseek-chat-v3-0324:free' }; }
}

function saveSettingsToStorage(s) {
  localStorage.setItem(SETTINGS_KEY, JSON.stringify(s));
}

function openSettings() {
  const s = getSettings();
  setModeUI(s.mode || 'rule');
  document.getElementById('sPlatform').value = s.platform || 'openrouter';
  document.getElementById('sApiKey').value = s.apiKey || '';
  document.getElementById('sModel').value = s.model || 'deepseek/deepseek-chat-v3-0324:free';
  document.getElementById('sSFModel').value = s.sfModel || 'Qwen/Qwen2.5-7B-Instruct';
  document.getElementById('sBaseUrl').value = s.customUrl || '';
  const dsSel = document.getElementById('sDSModel');
  if (dsSel) dsSel.value = s.dsModel || 'deepseek-v4-flash';
  const cmSel = document.getElementById('sCustomModel');
  if (cmSel) cmSel.value = s.customModel || '';
  onPlatformChange();
  document.getElementById('settingsModal').classList.add('show');
}

function closeSettings() {
  document.getElementById('settingsModal').classList.remove('show');
}

function setMode(mode) {
  setModeUI(mode);
}

function setModeUI(mode) {
  const ruleBtn = document.getElementById('modeRule');
  const aiBtn = document.getElementById('modeAI');
  const aiPanel = document.getElementById('aiSettings');
  if (mode === 'ai') {
    ruleBtn.className = 'nb';
    aiBtn.className = 'nb accent';
    aiPanel.style.display = 'block';
  } else {
    ruleBtn.className = 'nb accent';
    aiBtn.className = 'nb';
    aiPanel.style.display = 'none';
  }
}

function onPlatformChange() {

  const customWrap = document.getElementById('customUrlWrap');
  const modelWrap = document.getElementById('sModel').parentElement;
  const sfWrap = document.getElementById('sfModelWrap');
  const dsWrap = document.getElementById('dsModelWrap');
  const guide = document.getElementById('platformGuide');

  customWrap.style.display = p === 'custom' ? 'block' : 'none';
  sfWrap.style.display = p === 'siliconflow' ? 'block' : 'none';
  dsWrap.style.display = p === 'deepseek' ? 'block' : 'none';
  modelWrap.style.display = p === 'openrouter' ? 'block' : 'none';

  if (p === 'openrouter') {
    guide.innerHTML = `<strong>OpenRouter 获取免费 Key：</strong><br>
      1. 打开 <a href="https://openrouter.ai/" target="_blank" style="color:var(--accent)">openrouter.ai</a> 用 Google/GitHub 登录<br>
      2. 搜索免费模型 → 点击 API → 创建 Key<br>
      3. 粘贴到上方输入框<br>
      <span style="color:var(--text3)">免费额度：20请求/分钟，200请求/天</span>`;
  } else if (p === 'deepseek') {
    guide.innerHTML = `<strong>DeepSeek 官方 API：</strong><br>
      1. 打开 <a href="https://platform.deepseek.com/" target="_blank" style="color:var(--accent)">platform.deepseek.com</a> 注册登录<br>
      2. 进入 API Keys 页面 → 创建 Key<br>
      3. 粘贴到上方输入框<br>
      <span style="color:var(--text3)">新用户赠送额度，DeepSeek V4 Flash 性价比最高</span>`;
  } else if (p === 'siliconflow') {
    guide.innerHTML = `<strong>SiliconFlow 获取免费 Key：</strong><br>
      1. 打开 <a href="https://cloud.siliconflow.cn/" target="_blank" style="color:var(--accent)">cloud.siliconflow.cn</a> 注册<br>
      2. 进入控制台 → API 密钥 → 创建<br>
      3. 粘贴到上方输入框<br>
      <span style="color:var(--text3)">注册送额度，部分模型免费</span>`;
  } else {
    guide.innerHTML = `<strong>自定义接口（OpenAI 兼容格式）：</strong><br>
      支持任何兼容 OpenAI Chat Completions 的 API，如本地 Ollama、LM Studio、Azure OpenAI 等。<br>
      <b>API 地址</b>：填写完整地址，系统会自动补全 /v1/chat/completions 后缀。<br>
      <b>模型名称</b>：填写该接口对应的模型标识符，如 gpt-4o、claude-3-sonnet 等。<br>
      <span style="color:var(--text3)">示例地址：http://localhost:11434（Ollama）或 https://your-server.com/v1</span>`;

function saveSettings() {
  const mode = document.getElementById('aiSettings').style.display === 'none' ? 'rule' : 'ai';
  const platform = document.getElementById('sPlatform').value;
  const apiKey = document.getElementById('sApiKey').value.trim();

  if (mode === 'ai' && !apiKey) {
    showToast('请输入 API Key');
    document.getElementById('sApiKey').focus();
    return;
  }

  if (mode === 'ai' && platform === 'custom' && !document.getElementById('sBaseUrl').value.trim()) {
    showToast('请输入 API 地址');
    document.getElementById('sBaseUrl').focus();
    return;
  }

  const settings = {
    mode,
    platform,
    apiKey,
    model: document.getElementById('sModel').value,
    sfModel: document.getElementById('sSFModel').value,
    dsModel: document.getElementById('sDSModel')?.value || 'deepseek-v4-flash',
    customUrl: document.getElementById('sBaseUrl').value.trim(),
    customModel: document.getElementById('sCustomModel')?.value.trim() || ''
  };

  saveSettingsToStorage(settings);
  closeSettings();
  updateModeIndicator();
  showToast(mode === 'ai' ? 'AI 模式已启用 ✓' : '规则模式已启用');
}
