    <script>
        (function() {

                '鎯呮劅鎴?, '鍐茬獊鎴?
            ];
            let globalTags = [];
            let appData = { scripts: [], activeScriptId: null, customTags: [] };
            let recordTagFilter = null;
            const STORAGE_KEY = 'script_progress_v9_full';
            const AUTO_BACKUP_KEY = 'autoBackupEnabled';
            const MAX_FILE_SIZE = 15 * 1024 * 1024;
            const AUTO_SAVE_INTERVAL = 120000;
            const DEBOUNCE_SAVE_MS = 3000;
            let scriptCloudTimer = null;

            function getApiBase() {
                const u = document.getElementById('portfolioCloudBase')?.value?.trim()
                    || localStorage.getItem('portfolio_cloud_base') || '';
                return u.replace(/\/$/, '');
            }
            function apiHeaders(json) {
                const h = {};
                if (json !== false) h['Content-Type'] = 'application/json';
                const token = document.getElementById('portfolioCloudToken')?.value?.trim()
                    || localStorage.getItem('portfolio_cloud_token') || '';
                if (token) h['X-API-Key'] = token;
                return h;
            }
            function restoreScriptCloudUI() {
                const b = localStorage.getItem('portfolio_cloud_base');
                const t = localStorage.getItem('portfolio_cloud_token');
                const baseEl = document.getElementById('portfolioCloudBase');
                const tokEl = document.getElementById('portfolioCloudToken');
                if (b && baseEl) baseEl.value = b;
                if (t && tokEl) tokEl.value = t;
                const cb = document.getElementById('scriptCloudSync');
                if (cb) cb.checked = localStorage.getItem('script_cloud_sync') === '1';
            }
            function persistScriptCloudSettings() {
                localStorage.setItem('portfolio_cloud_base', document.getElementById('portfolioCloudBase')?.value?.trim() || '');
                localStorage.setItem('portfolio_cloud_token', document.getElementById('portfolioCloudToken')?.value?.trim() || '');
                localStorage.setItem('script_cloud_sync', document.getElementById('scriptCloudSync')?.checked ? '1' : '0');
            }
            async function tryPullScriptCloud() {
                if (!document.getElementById('scriptCloudSync')?.checked || !getApiBase()) return false;
                try {
                    const r = await fetch(`${getApiBase()}/api/demo/script-review`, { headers: apiHeaders(false) });
                    if (!r.ok) return false;
                    const data = await r.json();
                    if (!data.payload) return false;
                    appData = data.payload;
                    localStorage.setItem(STORAGE_KEY, JSON.stringify(appData));
                    return true;
                } catch (e) {
                    console.warn(e);
                    return false;
                }
            }
            async function pushScriptCloud() {
                if (!document.getElementById('scriptCloudSync')?.checked || !getApiBase()) return;
                try {
                    const r = await fetch(`${getApiBase()}/api/demo/script-review`, {
                        method: 'PUT',
                        headers: apiHeaders(),
                        body: JSON.stringify({ payload: appData })
                    });
                    if (!r.ok) console.warn('浜戠澶囦唤', r.status);
                } catch (e) {
                    console.warn(e);
                }
            }
            function scheduleScriptCloudPush() {
                if (!document.getElementById('scriptCloudSync')?.checked || !getApiBase()) return;
                clearTimeout(scriptCloudTimer);
                scriptCloudTimer = setTimeout(() => pushScriptCloud(), 650);
            }

            function showToast(message, duration = 2000) {
                let toast = document.querySelector('.toast-message');
                if (toast) toast.remove();
                toast = document.createElement('div');
                toast.className = 'toast-message';
                toast.textContent = message;
                document.body.appendChild(toast);
                setTimeout(() => { if (toast) toast.style.opacity = '0';
                    setTimeout(() => toast?.remove(), 300); }, duration);
            }

            function generateId() { return 'id_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9); }

            function base64DecodeUnicode(str) { try { return decodeURIComponent(escape(atob(str))); } catch (
                e) { return str; } }

            function debounce(fn, delay) { let timer; return function(...args) { clearTimeout(timer);
                    timer = setTimeout(() => fn.apply(this, args), delay); }; }

            function cleanTestDocuments() {
                let cleaned = false;
                appData.scripts.forEach(script => {
                    if (script.records) {
                        script.records = script.records.filter(rec => {
                            if (rec.fileName && (rec.fileName.toLowerCase().includes(
                                    'test.doc') || rec.fileName === 'test.doc')) { cleaned = true; return false; }
                            if (rec.fileName && !rec.fileContent) { rec.fileName = '';
                                rec.fileContent = '';
                                rec.fileType = '';
                                cleaned = true; }
                            if (!rec.tags) rec.tags = [];
                            return true;
                        });
                    }
                });
                const firstScript = appData.scripts[0];

            function calcStreak(dateMap) {
                const today = new Date();
                today.setHours(0, 0, 0, 0);
                let current = 0;
                let max = 0;
                let temp = 0;
                const d = new Date(today);
                while (true) {
                    const key = d.toISOString().slice(0, 10);
                    if (dateMap.has(key)) { temp++; max = Math.max(max, temp); } else break;
                    d.setDate(d.getDate() - 1);
                }
                current = temp;
                const allDates = Array.from(dateMap.keys()).sort();
                if (allDates.length > 0) {
                    let streak = 1;
                    for (let i = 1; i < allDates.length; i++) {
                        const prev = new Date(allDates[i - 1]);
                        const cur = new Date(allDates[i]);
                        const diff = (cur - prev) / 86400000;
                        if (diff === 1) { streak++; max = Math.max(max, streak); } else streak = 1;
                    }
                }
                return { current, max };
            }

            function renderHeatmap() {
                const container = document.getElementById('heatmapContent');
                const dateMap = getAllRecordDates();
                const today = new Date();
                today.setHours(0, 0, 0, 0);
                const weeks = 26;
                const startDate = new Date(today);
                startDate.setDate(startDate.getDate() - (weeks * 7 - 1) - startDate.getDay());
                const weekdays = ['鏃?, '涓€', '浜?, '涓?, '鍥?, '浜?, '鍏?];
                const months = ['1鏈?, '2鏈?, '3鏈?, '4鏈?, '5鏈?, '6鏈?, '7鏈?, '8鏈?, '9鏈?, '10鏈?, '11鏈?, '12鏈?];
                let html = '';
                const streak = calcStreak(dateMap);
                html += `<div class="heatmap-header">
                    <div class="streak-badge">馃敟 杩炵画 ${streak.current} 澶?/div>
                    <div class="streak-badge">馃弳 鏈€闀?${streak.max} 澶?/div>
                </div>`;
                html += '<div style="display:flex;">';
                html += '<div class="heatmap-weekdays">';
                for (let w = 0; w < 7; w++) html += `<span>${w % 2 === 1 ? weekdays[w] : ''}</span>`;
                html += '</div>';
                html += '<div><div class="heatmap-months">';
                let lastMonth = -1;
                for (let w = 0; w < weeks; w++) {
                    const d = new Date(startDate);
                    d.setDate(d.getDate() + w * 7);
                    const m = d.getMonth();
                    if (m !== lastMonth) { html += `<span>${months[m]}</span>`; lastMonth = m; }
                    else html += '<span></span>';
                }
                html += '</div>';
                html += '<div class="heatmap-grid">';
                for (let w = 0; w < weeks; w++) {
                    html += '<div class="heatmap-week">';
                    for (let d = 0; d < 7; d++) {
                        const cellDate = new Date(startDate);
                        cellDate.setDate(cellDate.getDate() + w * 7 + d);
                        const key = cellDate.toISOString().slice(0, 10);
                        const count = dateMap.get(key) || 0;
                        const isFuture = cellDate > today;
                        const isToday = cellDate.getTime() === today.getTime();
                        let lv = '';
                        if (!isFuture) {
                            if (count === 1) lv = 'lv1';
                            else if (count === 2) lv = 'lv2';
                            else if (count === 3) lv = 'lv3';
                            else if (count >= 4) lv = 'lv4';
                        }
                        const border = isToday ? 'border:2px solid var(--accent-border);' : '';
                        const opacity = isFuture ? 'opacity:0.3;' : '';
                        html += `<div class="heatmap-cell ${lv}" data-date="${key}" data-count="${count}" style="${border}${opacity}"></div>`;
                    }
                    html += '</div>';
                }
                html += '</div></div></div>';
                const totalDays = Array.from(dateMap.keys()).length;
                const totalRecords = Array.from(dateMap.values()).reduce((a, b) => a + b, 0);
                html += `<div class="heatmap-legend"><span>灏?/span>
                    <div class="heatmap-cell"></div>
                    <div class="heatmap-cell lv1"></div>
                    <div class="heatmap-cell lv2"></div>
                    <div class="heatmap-cell lv3"></div>
                    <div class="heatmap-cell lv4"></div>
                    <span>澶?/span></div>`;
                html += `<div class="heatmap-stats">
                    <div class="stat-item"><div class="stat-num">${totalDays}</div><div class="stat-label">鍐欎綔澶╂暟</div></div>
                    <div class="stat-item"><div class="stat-num">${totalRecords}</div><div class="stat-label">鎬昏褰?/div></div>
                    <div class="stat-item"><div class="stat-num">${streak.current}</div><div class="stat-label">褰撳墠杩炵画</div></div>
                    <div class="stat-item"><div class="stat-num">${streak.max}</div><div class="stat-label">鏈€闀胯繛缁?/div></div>
                </div>`;
                container.innerHTML = html;
                const tooltip = document.getElementById('heatmapTooltip');
                container.querySelectorAll('.heatmap-grid .heatmap-cell').forEach(cell => {
                    cell.addEventListener('mouseenter', (e) => {
                        const date = cell.dataset.date;

                function getAIPlotResult(type) {
                    const kw = (document.getElementById('aiPlotKeywordInput').value || '').trim();
                    const pools = { plot: AI_PLOTS, dialogue: AI_DIALOGUES, scene: AI_SCENES };
                    const pool = pools[type];
                    const key = Object.keys(pool).find(k => kw.includes(k)) || Object.keys(pool)[Math.floor(Math.random()*4)];
                    const items = pool[key];
                    const count = type === 'plot' ? 2 : 1;
                    const shuffled = [...items].sort(() => Math.random() - 0.5);
                    return shuffled.slice(0, count).join('\n\n');
                }

            function initTheme() {

                    btns.forEach(btn => btn.classList.toggle('active', btn.dataset.theme === t));
                    localStorage.setItem('script_theme', t);

                btns.forEach(b => b.addEventListener('click', () => applyTheme(b.dataset.theme)));
                const saved = localStorage.getItem('script_theme') || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'default');

                    try {
                        const r = await fetch(`${base}/api/health`, { headers: apiHeaders(false) });
                        const j = await r.json().catch(() => ({}));
                        st.textContent = r.ok ? `鉁?${j.service || 'OK'}` : `HTTP ${r.status}`;
                    } catch (e) {
                        st.textContent = '鉂?' + e.message;
                    }
                });
                await tryPullScriptCloud();
                loadData();
                setDefaultDate();
                renderSidebar();
                renderRecords();
                renderRecordTagSelector([]);
                bindEvents();
                initTheme();
                startAutoSave();
                const appHeader = document.querySelector('.app-header');
                if (appHeader) {
                    let lastY = window.scrollY;
                    let ticking = false;
                    const autoHideHeader = () => {
                        ticking = false;
                        const y = window.scrollY;
                        const isMobile = window.innerWidth <= 900;
                        if (!isMobile || y < 24) {
                            appHeader.classList.remove('auto-hide-hidden');
                            lastY = y;
                            return;
                        }
                        const delta = y - lastY;
                        if (delta > 8) appHeader.classList.add('auto-hide-hidden');
                        else if (delta < -8) appHeader.classList.remove('auto-hide-hidden');
                        lastY = y;
                    };
                    window.addEventListener('scroll', () => {
                        if (!ticking) {
                            ticking = true;
                            requestAnimationFrame(autoHideHeader);
                        }
                    }, { passive: true });
                    const revealHeaderIfTopTapped = (ev) => {
                        const isMobile = window.innerWidth <= 900;
                        const clientY = ev.touches?.[0]?.clientY ?? ev.clientY;
                        if (!isMobile || typeof clientY !== 'number') return;
                        if (clientY <= 64) appHeader.classList.remove('auto-hide-hidden');
                    };
                    window.addEventListener('touchstart', revealHeaderIfTopTapped, { passive: true });
                    window.addEventListener('pointerdown', revealHeaderIfTopTapped, { passive: true });
                    window.addEventListener('resize', autoHideHeader, { passive: true });
                    autoHideHeader();
                }
            }
            init();
        })();

  if ((e.ctrlKey || e.metaKey) && e.key === 's') {
    e.preventDefault();

  }
  if (e.key === 'Escape') {
    document.querySelectorAll('.modal-overlay.show, .modal-overlay[style*="visible"]').forEach(function(m) {
      m.classList.remove('show');
      m.style.visibility = 'hidden';

});

.scroll-reveal{opacity:0;transform:translateY(20px);transition:opacity .7s cubic-bezier(.4,0,.2,1),transform .7s cubic-bezier(.4,0,.2,1)}
.scroll-reveal.visible{opacity:1;transform:translateY(0)}
.scroll-reveal[data-delay="100"]{transition-delay:.1s}
.scroll-reveal[data-delay="200"]{transition-delay:.2s}
.scroll-reveal[data-delay="300"]{transition-delay:.3s}
</style>
<script>
(function(){
  var obs=new IntersectionObserver(function(entries){
    entries.forEach(function(e){
      if(e.isIntersecting){e.target.classList.add('visible');obs.unobserve(e.target)}
    });
  },{threshold:0.1,rootMargin:'0px 0px -40px 0px'});
  document.querySelectorAll('.scroll-reveal').forEach(function(el){obs.observe(el)});
})();
</script>
