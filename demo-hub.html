<html lang="zh-CN" data-app="hub">

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      /* 色彩系统 - 专业蓝调 */
      --bg-primary: #fafbfd;
      --bg-secondary: #f0f4f8;
      --bg-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      
      --surface: #ffffff;
      --surface-hover: #f8fafc;
      --surface-glass: rgba(255, 255, 255, 0.8);
      --surface-glass-border: rgba(255, 255, 255, 0.2);
      
      --text-primary: #1a1a2e;
      --text-secondary: #4a5568;
      --text-tertiary: #718096;
      --text-inverse: #ffffff;
      
      --accent: #4f46e5;
      --accent-light: #818cf8;
      --accent-soft: rgba(79, 70, 229, 0.08);
      --accent-glow: rgba(79, 70, 229, 0.15);
      
      --success: #10b981;
      --success-soft: rgba(16, 185, 129, 0.08);
      
      --warning: #f59e0b;
      --warning-soft: rgba(245, 158, 11, 0.08);
      
      --border: rgba(0, 0, 0, 0.06);
      --border-light: rgba(0, 0, 0, 0.04);
      
      --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.05);
      --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
      --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
      --shadow-xl: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
      --shadow-glow: 0 0 20px rgba(79, 70, 229, 0.15);
      
      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 16px;
      --radius-xl: 20px;
      
      --transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      --transition-slow: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    
    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    html {
      scroll-behavior: smooth;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
      color: var(--text-primary);
      background: var(--bg-primary);
      line-height: 1.6;
      min-height: 100vh;
      overflow-x: hidden;
    }
    
    /* 背景装饰 */
    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 400px;
      background: linear-gradient(180deg, rgba(79, 70, 229, 0.03) 0%, transparent 100%);
      pointer-events: none;
      z-index: -1;
    }
    
    .wrap {
      max-width: 1200px;
      margin: 0 auto;
      padding: 40px 24px 80px;
    }
    
    /* Hero 区域 - 面试官视角 */
    .hero {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-xl);
      padding: 40px;
      box-shadow: var(--shadow-lg);
      margin-bottom: 40px;
      position: relative;
      overflow: hidden;
    }
    
    .hero::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: var(--bg-gradient);
    }
    
    .hero-content {
      position: relative;
      z-index: 1;
    }
    
    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      background: var(--accent-soft);
      color: var(--accent);
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      margin-bottom: 20px;
      letter-spacing: 0.02em;
    }
    
    .hero-badge::before {
      content: '✦';
      font-size: 10px;
    }
    
    h1 {
      margin: 0 0 12px;
      font-size: 32px;
      font-weight: 800;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, var(--text-primary) 0%, var(--accent) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    
    .desc {
      margin: 0 0 28px;
      color: var(--text-secondary);
      font-size: 16px;
      line-height: 1.7;
      max-width: 700px;
    }
    
    /* 核心指标 - 面试官关注点 */
    .metrics {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 20px;
      margin-bottom: 32px;
    }
    
    .metric-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 24px;
      text-align: center;
      transition: var(--transition);
      box-shadow: var(--shadow-sm);
    }
    
    .metric-card:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-md);
    }
    
    .metric-icon {
      font-size: 36px;
      margin-bottom: 16px;
      line-height: 1;
    }
    
    .metric-value {
      font-size: 28px;
      font-weight: 800;
      color: var(--accent);
      line-height: 1;
      margin-bottom: 8px;
    }
    
    .metric-label {
      font-size: 14px;
      color: var(--text-secondary);
      font-weight: 500;
    }
    
    .metric-desc {
      font-size: 12px;
      color: var(--text-tertiary);
      margin-top: 8px;
      line-height: 1.4;
    }
    
    /* 快速操作区 */
    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      margin-bottom: 40px;
    }
    
    button, .link-btn {
      border: none;
      background: var(--surface);
      color: var(--text-primary);
      border-radius: var(--radius-md);
      padding: 14px 24px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: var(--transition);
      box-shadow: var(--shadow-sm);
      border: 1px solid var(--border);
      font-family: inherit;
    }
    
    button:hover, .link-btn:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow-md);
    }
    
    button:active, .link-btn:active {
      transform: translateY(0);
    }
    
    button.primary {
      background: var(--accent);
      border-color: var(--accent);
      color: var(--text-inverse);
      box-shadow: var(--shadow-md), var(--shadow-glow);
    }
    
    button.primary:hover {
      background: #4338ca;
      box-shadow: var(--shadow-lg), var(--shadow-glow);
    }
    
    button .icon {
      font-size: 18px;
    }
    
    /* 分组卡片 - 面试官浏览逻辑 */
    .group {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-xl);
      margin-bottom: 32px;
      overflow: hidden;
      transition: var(--transition-slow);
      box-shadow: var(--shadow-sm);
    }
    
    .group:hover {
      box-shadow: var(--shadow-md);
    }
    
    .group-head {
      padding: 24px 28px;
      background: linear-gradient(135deg, rgba(79, 70, 229, 0.02) 0%, rgba(255, 255, 255, 0) 100%);
      border-bottom: 1px solid var(--border-light);
    }
    
    .group-title {
      margin: 0;
      font-size: 20px;
      font-weight: 700;
      color: var(--text-primary);
    }
    
    .group-sub {
      margin: 6px 0 0;
      color: var(--text-tertiary);
      font-size: 14px;
      font-weight: 400;
    }
    
    .items {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 20px;
      padding: 24px;
    }
    
    .item {
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 24px;
      background: var(--surface);
      transition: var(--transition);
      position: relative;
      overflow: hidden;
      cursor: pointer;
    }
    
    .item::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 4px;
      height: 100%;
      background: var(--accent);
      opacity: 0;
      transition: var(--transition);
    }
    
    .item:hover {
      border-color: var(--accent-light);
      box-shadow: var(--shadow-md), 0 0 0 1px rgba(79, 70, 229, 0.1);
      transform: translateY(-4px);
    }
    
    .item:hover::before {
      opacity: 1;
    }
    
    .item-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 16px;
    }
    
    .item h3 {
      margin: 0;
      font-size: 18px;
      font-weight: 700;
      color: var(--text-primary);
    }
    
    .item p {
      margin: 0 0 20px;
      color: var(--text-secondary);
      font-size: 14px;
      line-height: 1.6;
    }
    
    .item-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 20px;
    }
    
    .tag {
      display: inline-flex;
      align-items: center;
      padding: 4px 10px;
      background: var(--accent-soft);
      color: var(--accent);
      border-radius: 12px;
      font-size: 12px;
      font-weight: 500;
    }
    
    .tag.success {
      background: var(--success-soft);
      color: var(--success);
    }
    
    .tag.warning {
      background: var(--warning-soft);
      color: var(--warning);
    }
    
    .item-actions {
      display: flex;
      gap: 12px;
    }
    
    .mini {
      font-size: 14px;
      padding: 10px 16px;
      border-radius: var(--radius-sm);
    }
    
    /* 底部 */
    .footer {
      text-align: center;
      padding: 48px 24px;
      color: var(--text-tertiary);
      font-size: 14px;
    }
    
    .footer a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 500;
    }
    
    .footer a:hover {
      text-decoration: underline;
    }
    
    /* 响应式 - 移动端优先 */
    @media (max-width: 1024px) {
      .metrics {
        grid-template-columns: repeat(2, 1fr);
      }
    }
    
    @media (max-width: 768px) {
      .wrap {
        padding: 16px 12px 40px;
      }
      
      .hero {
        padding: 20px 16px;
        margin-bottom: 24px;
        border-radius: 16px;
      }
      
      h1 {
        font-size: 22px;
        line-height: 1.3;
      }
      
      .desc {
        font-size: 14px;
        margin-bottom: 20px;
      }
      
      .metrics {
        grid-template-columns: repeat(2, 1fr);
        gap: 8px;
        margin-bottom: 20px;
      }
      
      .metric-card {
        padding: 16px 12px;
        border-radius: 12px;
      }
      
      .metric-icon {
        font-size: 28px;
        margin-bottom: 10px;
      }
      
      .metric-value {
        font-size: 22px;
        margin-bottom: 4px;
      }
      
      .metric-label {
        font-size: 12px;
      }
      
      .metric-desc {
        font-size: 11px;
        margin-top: 4px;
      }
      
      .actions {
        flex-direction: column;
        gap: 10px;
        margin-bottom: 24px;
      }
      
      button, .link-btn {
        width: 100%;
        padding: 14px 16px;
        font-size: 15px;
      }
      
      .group {
        margin-bottom: 20px;
        border-radius: 16px;
      }
      
      .group-head {
        padding: 16px;
      }
      
      .group-title {
        font-size: 17px;
      }
      
      .group-sub {
        font-size: 12px;
      }
      
      .items {
        grid-template-columns: 1fr;
        gap: 12px;
        padding: 12px;
      }
      
      .item {
        padding: 16px;
        border-radius: 12px;
      }
      
      .item h3 {
        font-size: 16px;
      }
      
      .item p {
        font-size: 13px;
        margin-bottom: 12px;
      }
      
      .item-tags {
        gap: 6px;
        margin-bottom: 14px;
      }
      
      .tag {
        font-size: 11px;
        padding: 3px 8px;
      }
      
      .item-actions {
        flex-direction: column;
        gap: 8px;
      }
      
      .mini {
        width: 100%;
        padding: 12px;
        font-size: 14px;
      }
      
      .footer {
        padding: 30px 16px;
        font-size: 12px;
      }
    }
    
    @media (max-width: 375px) {
      .wrap {
        padding: 12px 10px 32px;
      }
      
      .hero {
        padding: 16px 12px;
      }
      
      h1 {
        font-size: 20px;
      }
      
      .metrics {
        grid-template-columns: 1fr 1fr;
        gap: 6px;
      }
      
      .metric-card {
        padding: 12px 8px;
      }
      
      .metric-value {
        font-size: 20px;
      }
      
      .group-head {
        padding: 12px;
      }
      
      .items {
        padding: 10px;
      }
      
      .item {
        padding: 14px 12px;
      }
    }
    
    /* Android tap fix */
    html{-webkit-tap-highlight-color:transparent}
    img,canvas,pre,code,table,iframe{max-width:100%}
    a,button,[onclick],summary,select,input,textarea{touch-action:manipulation; -webkit-tap-highlight-color:transparent}
    
    /* 移动端触摸优化 */
    @media (hover: none) and (pointer: coarse) {
      button, .link-btn, .item {
        -webkit-tap-highlight-color: transparent;
      }
      
      button:active, .link-btn:active {
        transform: scale(0.98);
        opacity: 0.9;
      }
      
      .item:active {
        transform: scale(0.98);
        background: var(--surface-hover);
      }
    }
  </style>

    ];

    function renderGroups() {
      const host = document.getElementById("groups");
      host.innerHTML = "";

      for (const group of GROUPS) {
        const box = document.createElement("section");
        box.className = "group";

        const head = document.createElement("div");
        head.className = "group-head";

        const headLeft = document.createElement("div");
        headLeft.innerHTML = `
          <h2 class="group-title">${group.title}</h2>
          <p class="group-sub">${group.subtitle}</p>
        `;

        head.appendChild(headLeft);

        const items = document.createElement("div");
        items.className = "items";

        for (const item of group.items) {
          const card = document.createElement("article");
          card.className = "item";
          card.addEventListener("click", (e) => {
            // 如果点击的是按钮或链接，不处理
            if (e.target.closest('a') || e.target.closest('button')) return;
            window.open(item.href, "_blank", "noopener");
          });
          
          const tagsHtml = item.tags ? item.tags.map(tag => 
            `<span class="tag">${tag}</span>`
          ).join('') : '';
          
          const metricsHtml = item.metrics ? item.metrics.map(metric => 
            `<span class="tag success">${metric}</span>`
          ).join('') : '';
          
          card.innerHTML = `
            <div class="item-header">
              <h3>${item.title}</h3>
            </div>
            <p>${item.note}</p>
            <div class="item-tags">
              ${tagsHtml}
              ${metricsHtml}
            </div>
            <div class="item-actions">
              <a class="link-btn mini" href="${item.href}" target="_blank" rel="noopener">
                <span class="icon">🔗</span> 体验 Demo
              </a>
            </div>
          `;
          items.appendChild(card);
        }

        box.appendChild(head);
        box.appendChild(items);
        host.appendChild(box);
      }
    }

    // 初始化
    renderGroups();
  </script>
</body>
</html>
