        const stop = new Set(['鐨?,'浜?,'鍜?,'鏄?,'鍦?,'鎴?,'浣?,'浠?,'濂?,'瀹?,'鏈?,'涓?,'鍙?,'骞?,'灏?,'閮?,'鑰?,'鎴?,'鍒?,'涓?,'鎶?,'琚?,'杩?,'閭?,'涓€涓?,'鎴戜滑','浠栦滑','鑷繁','浠ュ強','鐒跺悗','鍥犱负','鎵€浠?,'浣嗘槸','濡傛灉','杩欎釜','閭ｄ釜','杩涜','宸茬粡','鍙互','闇€瑕?,'浠ュ強','the','and','for','with','that','this','from','into','about']);
        const cnt = new Map();
        texts.forEach(t=>{
            const tokens = String(t||'').toLowerCase().match(/[\u4e00-\u9fa5]{2,}|[a-zA-Z]{3,}/g) || [];
            tokens.forEach(tok=>{
                if(stop.has(tok)) return;
                cnt.set(tok, (cnt.get(tok)||0)+1);
            });
        });
        return [...cnt.entries()].sort((a,b)=>b[1]-a[1]).slice(0,limit);
    }

    function randomIndexBelow(n){
        if (n <= 0) return 0;
        const buf = new Uint32Array(1);
        const lim = Math.floor(0x100000000 / n) * n;
        let x;
        do { crypto.getRandomValues(buf); x = buf[0]; } while (x >= lim);
        return x % n;
    }

    function renderHealthScore(){
        const script=getActiveScript(); const box=document.getElementById('healthScoreBox'); if(!script||!box) return;
        const records=script.records||[];
        if(!records.length){ box.innerHTML='<div class="empty-message">鏆傛棤璁板綍锛屽厛鍐欎竴鏉″惂</div>'; return; }
        const today = new Date(); today.setHours(0,0,0,0);
        const dates = [...new Set(records.filter(r=>r.date).map(r=>r.date))].sort();
        let streak=0; let cursor=new Date(today);
        while(dates.includes(dateKey(cursor))){ streak++; cursor.setDate(cursor.getDate()-1); }
        const doneCount = records.filter(r=>r.status==='瀹岀').length;
        const doneRate = Math.round(doneCount / records.length * 100);
        const goalDaily = parseInt(script.goals?.daily || 1200,10);
        const todayWords = countWords(script.outline?.text || '') + records.filter(r=>r.date===dateKey(today)).reduce((s,r)=>s+countWords(r.reflection),0);
        const goalScore = Math.min(100, Math.round(todayWords/Math.max(1,goalDaily)*100));
        const lastDate = dates[dates.length-1]; const delayDays = lastDate ? Math.max(0, Math.floor((today - new Date(lastDate))/(1000*60*60*24))) : 30;
        let score = 50 + Math.min(20, streak*3) + Math.round(doneRate*0.2) + Math.round(goalScore*0.15) - Math.min(20, delayDays);
        score = Math.max(0, Math.min(100, score));
        const grade = score >= 85 ? 'A' : (score >= 65 ? 'B' : 'C');
        const gradeColor = grade === 'A' ? '#2e7d32' : (grade === 'B' ? '#e09f3e' : '#c0392b');
        box.innerHTML = `
            <div style="display:flex; justify-content:space-between; margin-bottom:8px;"><strong>褰撳墠鍋ュ悍璇勫垎</strong><strong style="color:${gradeColor};">${score}锛?{grade}锛?/strong></div>
            <div style="height:10px; background:var(--tag-bg); border-radius:999px; overflow:hidden;"><div style="height:10px; width:${score}%; background:var(--accent-border);"></div></div>
            <div class="small-note" style="margin-top:8px;">杩炵画鍒涗綔 ${streak} 澶?路 瀹岀鐜?${doneRate}% 路 浠婃棩鐩爣杈炬垚 ${goalScore}% 路 鏈€杩戞嫋寤?${delayDays} 澶?路 绛夌骇 ${grade}</div>
        `;
    }

    let wordTrendChartInstance = null;

    function renderWordTrend(){
        const ctx = document.getElementById('wordTrendChart');
        const statsBox = document.getElementById('wordTrendStats');
        if (!ctx || !statsBox) return;

        const script = getActiveScript();
        if (!script) {
            statsBox.innerHTML = '<div style="color:var(--muted);">璇峰厛閫夋嫨椤圭洰</div>';
            return;
        }

        const records = script.records || [];
        const outlineWords = countWords(script.outline?.text || '');
        
        const dailyWords = {};
        const now = new Date();
        for (let i = 29; i >= 0; i--) {
            const d = new Date(now);
            d.setDate(d.getDate() - i);
            const key = dateKey(d);
            dailyWords[key] = 0;
        }

        records.forEach(r => {
            if (r.date && dailyWords.hasOwnProperty(r.date)) {
                dailyWords[r.date] += countWords(r.reflection || '');
            }
        });

        const labels = Object.keys(dailyWords).map(d => d.substring(5));
        const data = Object.values(dailyWords);

        if (wordTrendChartInstance) wordTrendChartInstance.destroy();

        wordTrendChartInstance = new Chart(ctx, {
            type: 'line',
            data: {
                labels: labels,
                datasets: [{
                    label: '姣忔棩瀛楁暟',
                    data: data,
                    borderColor: '#3b82f6',
                    backgroundColor: 'rgba(59, 130, 246, 0.1)',
                    fill: true,
                    tension: 0.4,
                    pointRadius: 2,
                    pointHoverRadius: 5
                }]
            },
            options: {
                responsive: true,
                scales: {
                    x: {
                        grid: { display: false },
                        ticks: { maxTicksLimit: 7 }
                    },
                    y: {
                        beginAtZero: true,
                        ticks: { stepSize: 100 }
                    }
                },
                plugins: {
                    legend: {
                        display: false
                    },
                    tooltip: {
                        callbacks: {
                            label: function(context) {
                                return `瀛楁暟: ${context.parsed.y}`;
                            }
                        }
                    }
                }
            }
        });

        const totalWords = data.reduce((sum, v) => sum + v, 0);
        const avgWords = data.length > 0 ? Math.round(totalWords / data.length) : 0;
        const maxWords = Math.max(...data);
        const maxDay = labels[data.indexOf(maxWords)] || '-';

        statsHtml = `
            <div style="display:flex; gap:12px; flex-wrap:wrap;">
                <div>馃摑 鎬诲瓧鏁? <strong>${totalWords.toLocaleString()}</strong></div>
                <div>馃搳 鏃ュ潎: <strong>${avgWords}</strong></div>
                <div>馃弳 宄板€? <strong>${maxWords}</strong> (${maxDay})</div>
            </div>
        `;
        statsBox.innerHTML = statsHtml;
    }

            const v = document.getElementById('newChapterStatusInput').value.trim();
            if (!v) return;
            if (allChapterStatuses().includes(v)) { showToast('宸插瓨鍦?); return; }
            if (!appData.customStatuses) appData.customStatuses = [];
            appData.customStatuses.push(v);
            document.getElementById('newChapterStatusInput').value = '';
            saveData();
            renderChapterStatusSelects();
            renderChapterStatusManager();
            showToast('宸叉坊鍔犵姸鎬?);
        });
        ['insertHeadingBtn','insertListBtn','insertBoldBtn','insertDividerBtn'].forEach(id=>{ document.getElementById(id)?.addEventListener('click',()=>{ let ta=document.getElementById('outlineTextArea'); let start=ta.selectionStart; let end=ta.selectionEnd; let text=ta.value; let insert=''; if(id==='insertHeadingBtn') insert='\n## 浜岀骇鏍囬\n'; else if(id==='insertListBtn') insert='\n- 鍒楄〃椤筡n'; else if(id==='insertBoldBtn') insert='**鍔犵矖鏂囧瓧**'; else if(id==='insertDividerBtn') insert='\n---\n'; ta.value=text.slice(0,start)+insert+text.slice(end); ta.focus(); }); });
        document.getElementById('uploadOutlineBtn')?.addEventListener('click',()=>{ let input=document.createElement('input'); input.type='file'; input.onchange=e=>{ let file=e.target.files[0]; if(file){ let reader=new FileReader(); reader.onload=ev=>{ let b64=ev.target.result; if(file.name.endsWith('.txt')||file.name.endsWith('.md')){ let text=atob(b64.split(',')[1]); document.getElementById('outlineTextArea').value=text; } let script=getActiveScript(); if(script){ script.outline.fileName=file.name; script.outline.fileContent=b64; saveData(); renderOutline(); } }; reader.readAsDataURL(file); } }; input.click(); });
        document.getElementById('openOutlineFileBtn')?.addEventListener('click',()=>{ let script=getActiveScript(); if(script?.outline?.fileContent){ let a=document.createElement('a'); a.href=script.outline.fileContent; a.download=script.outline.fileName; a.click(); } });
        document.getElementById('clearOutlineFileBtn')?.addEventListener('click',()=>{ let script=getActiveScript(); if(script){ script.outline.fileName=''; script.outline.fileContent=''; saveData(); renderOutline(); showToast('宸叉竻闄ら檮浠?); } });
        document.getElementById('refModalCancel')?.addEventListener('click',()=>document.getElementById('refEditModal').style.visibility='hidden');
        document.getElementById('refModalSave')?.addEventListener('click',()=>{ let script=getActiveScript(); if(script && editingRefId){ let ref=script.references.find(r=>r.id===editingRefId); if(ref){ ref.title=document.getElementById('editRefTitle').value; ref.author=document.getElementById('editRefAuthor').value; ref.year=document.getElementById('editRefYear').value; ref.pages=document.getElementById('editRefPages').value; ref.link=document.getElementById('editRefLink').value; ref.note=document.getElementById('editRefNote').value; saveData(); renderReferences(); } } document.getElementById('refEditModal').style.visibility='hidden'; });
    }
    async function registerCreationSW(){
        if(!('serviceWorker' in navigator)) return;
        try { await navigator.serviceWorker.register('./creation-sw.js'); } catch(e) {}
    }
    async function init(){
        restoreCreationCloudUI();
        document.getElementById('creationCloudSync')?.addEventListener('change', persistCreationCloudSettings);
        document.getElementById('portfolioCloudBase')?.addEventListener('blur', persistCreationCloudSettings);
        document.getElementById('portfolioCloudToken')?.addEventListener('blur', persistCreationCloudSettings);
        document.getElementById('creationCloudPullBtn')?.addEventListener('click', async ()=>{
            persistCreationCloudSettings();
            const st = document.getElementById('creationCloudStatus');
            if (!getApiBase()) { st.textContent = '璇峰～鍐?API 鍦板潃'; return; }
            st.textContent = '鎷夊彇涓€?;
            await tryPullCreationCloud();
            loadData();
            refreshUI();
            st.textContent = '宸蹭粠浜戠鍚堝苟';
        });
        document.getElementById('creationCloudHealthBtn')?.addEventListener('click', async ()=>{
            persistCreationCloudSettings();
            const st = document.getElementById('creationCloudStatus');
            const base = getApiBase();
            if (!base) { st.textContent = '璇峰～鍐?API 鍦板潃'; return; }
            st.textContent = '妫€娴嬩腑鈥?;
            try {
                const r = await fetch(`${base}/api/health`, { headers: apiHeaders(false) });
                const j = await r.json().catch(()=>({}));
                st.textContent = r.ok ? `鉁?${j.service||'OK'}` : `HTTP ${r.status}`;
            } catch(e){ st.textContent = '鉂?'+e.message; }
        });
        await tryPullCreationCloud();
        const cloudDetails = document.getElementById('cloudSyncDetails');
        if (cloudDetails) {
            if (window.innerWidth < 900) cloudDetails.removeAttribute('open');
            else cloudDetails.setAttribute('open', '');
        }
        const devBar = document.getElementById('devCreditBar');
        if (localStorage.getItem('creation_hide_dev_credit') === '1') devBar?.classList.add('is-hidden');
        document.getElementById('devCreditDismiss')?.addEventListener('click', (ev) => {
            ev.preventDefault();
            ev.stopPropagation();
            devBar?.classList.add('is-hidden');
            localStorage.setItem('creation_hide_dev_credit', '1');
        });
        const isAndroidTablet = () => /Android/i.test(navigator.userAgent) && window.innerWidth <= 1100;
        const applyAndroidTabletToolsLayout = () => {
            const sidebar = document.querySelector('.script-sidebar');
            const content = document.querySelector('.content-panel');
            if (!sidebar || !content) return;
            let dock = document.getElementById('tabletBottomToolsDock');
            if (!dock) {
                dock = document.createElement('div');
                dock.id = 'tabletBottomToolsDock';
                dock.className = 'tablet-bottom-tools';
                dock.innerHTML = '<div class="section-title" style="margin-bottom:10px;">馃З 蹇嵎宸ュ叿鍖?/div><div class="tablet-bottom-tools-grid" id="tabletBottomToolsGrid"></div>';
                content.appendChild(dock);
            }
            const grid = document.getElementById('tabletBottomToolsGrid');
            if (!grid) return;
            if (isAndroidTablet()) {
                document.body.classList.add('is-android-tablet');
                const toolNodes = sidebar.querySelectorAll(':scope > .sidebar-tools-panel, :scope > .manage-tags-btn, :scope > .auto-backup-toggle');
                toolNodes.forEach(node => grid.appendChild(node));
            } else {
                document.body.classList.remove('is-android-tablet');
                const returnNodes = grid.querySelectorAll('.sidebar-tools-panel, .manage-tags-btn, .auto-backup-toggle');
                returnNodes.forEach(node => sidebar.appendChild(node));
            }
        };
        const appHeader = document.querySelector('.app-header');
        if (appHeader) {
            let lastY = window.scrollY;
            let ticking = false;
            const autoHideHeader = () => {
                ticking = false;
                const y = window.scrollY;
                const isMobile = window.innerWidth <= 900;
                if (!isMobile || y < 24) {
                    appHeader.classList.remove('auto-hide-hidden');
                    lastY = y;
                    return;
                }
                const delta = y - lastY;
                if (delta > 8) appHeader.classList.add('auto-hide-hidden');
                else if (delta < -8) appHeader.classList.remove('auto-hide-hidden');
                lastY = y;
            };
            window.addEventListener('scroll', () => {
                if (!ticking) {
                    ticking = true;
                    requestAnimationFrame(autoHideHeader);
                }
            }, { passive: true });
            const revealHeaderIfTopTapped = (ev) => {
                const isMobile = window.innerWidth <= 900;
                const clientY = ev.touches?.[0]?.clientY ?? ev.clientY;
                if (!isMobile || typeof clientY !== 'number') return;
                if (clientY <= 64) appHeader.classList.remove('auto-hide-hidden');
            };
            window.addEventListener('touchstart', revealHeaderIfTopTapped, { passive: true });
            window.addEventListener('pointerdown', revealHeaderIfTopTapped, { passive: true });
            window.addEventListener('resize', autoHideHeader, { passive: true });
            autoHideHeader();
        }
        loadData(); setDefaultDate(); refreshUI(); bindEvents(); applyAndroidTabletToolsLayout(); window.addEventListener('resize', applyAndroidTabletToolsLayout, { passive: true }); setInterval(()=>saveData(), 30000); registerCreationSW();
    }
    init();
})();
</script>
<script>
document.addEventListener('keydown', function(e) {
  if ((e.ctrlKey || e.metaKey) && e.key === 's') {
    e.preventDefault();
    if (typeof saveOutline === 'function') saveOutline();
    if (typeof saveData === 'function') saveData();
  }
  if (e.key === 'Escape') {
    document.querySelectorAll('.modal-overlay.show, .modal-overlay[style*="visible"]').forEach(function(m) {
      m.classList.remove('show');
      m.style.visibility = 'hidden';
    });
  }
});
</script>
<style>
.scroll-reveal{opacity:0;transform:translateY(20px);transition:opacity .7s cubic-bezier(.4,0,.2,1),transform .7s cubic-bezier(.4,0,.2,1)}
.scroll-reveal.visible{opacity:1;transform:translateY(0)}
.scroll-reveal[data-delay="100"]{transition-delay:.1s}
.scroll-reveal[data-delay="200"]{transition-delay:.2s}
.scroll-reveal[data-delay="300"]{transition-delay:.3s}
</style>
<script>
(function(){
  var obs=new IntersectionObserver(function(entries){
    entries.forEach(function(e){
      if(e.isIntersecting){e.target.classList.add('visible');obs.unobserve(e.target)}
    });
  },{threshold:0.1,rootMargin:'0px 0px -40px 0px'});
  document.querySelectorAll('.scroll-reveal').forEach(function(el){obs.observe(el)});
})();
</script>
