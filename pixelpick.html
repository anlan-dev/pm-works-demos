<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>PixelPick · AI 影像精选</title>
<!-- 开源免费中文字体: Noto Sans SC (Google Fonts, SIL Open Font License) -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ================================================================
   DESIGN SYSTEM: Darkroom Pixelsmith
   设计理念: 暗房接触印相 (Contact Sheet) × 精密测量工具
   目标用户: 专业设计师 / 内容创作者 / 摄影师 — 有选图决策需求
   色彩: 暗室炭黑底 + 琥珀色暗房安全灯光 (Darkroom Safelight)
   字体: Noto Sans SC(正文/中文) + 系统等宽字体(数据标注)
   awesome-design-md: Apple HIG 深色 / accent #0071e3 / rounded 10-14-18 / spacing 8px
   ================================================================ */
:root {
  --bg-deep:    #000000;   /* canvas — Apple HIG 暗色模式底色 */
  --bg-surface: #1c1c1e;   /* surface — 面板层 */
  --bg-card:    #2c2c2e;   /* card — 卡片层 */

  --border:     rgba(255,255,255,.1);
  --border-glow:rgba(0,113,227,.3);

  --text-primary:   #f5f5f7;
  --text-secondary: #98989d;
  --text-muted:     #6e6e73;
  --text-inverse:   #000000;

  --accent:      #0071e3;   /* accent — Apple Blue */
  --accent-glow: #2997ff;
  --accent-dark: #005bb5;
  --success:     #30d158;
  --warn:        #ff9f0a;
  --danger:      #ff453a;
  --chrome:      #3a3a3c;   /* 金属导轨 */
  --chrome-lt:   #636366;

  --radius-sm:  10px;
  --radius-md:  14px;
  --radius-lg:  18px;
  --radius-pill: 999px;
  --spacing-sm:  8px;
  --spacing-md: 12px;
  --spacing-lg: 20px;

  --shadow-card:  0 1px 3px rgba(0,0,0,.3);
  --shadow-elevated: 0 4px 12px rgba(0,0,0,.4);
  --shadow-loupe: 0 0 0 2px var(--accent-glow), 0 8px 24px rgba(0,0,0,.5);

  --font-mono: "SF Mono","Cascadia Code","Fira Code","JetBrains Mono",Consolas,monospace;
  --font-sans: "Noto Sans SC",-apple-system,BlinkMacSystemFont,"SF Pro Text","PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;

  --ease-out: cubic-bezier(.2,0,0,1);
  --ease-spring: cubic-bezier(.34,1.56,.64,1);
}

*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{background:var(--bg-deep)}
body{
  font-family:var(--font-sans);
  color:var(--text-primary);line-height:1.5;
  -webkit-font-smoothing:antialiased;overflow-x:hidden;
  -webkit-tap-highlight-color:transparent;
  padding-bottom:env(safe-area-inset-bottom,0);
}

/* === App Container — 工作台 === */
.app{
  max-width:960px;width:100%;margin:0 auto;
  padding:clamp(16px,3vw,28px) clamp(14px,4vw,32px);
}
/* 桌面端: 中央留白 + 栅格背景 */
@media(min-width:768px){
  .app{background:
    linear-gradient(90deg,rgba(255,255,255,.008) 0%,transparent 1%,transparent 99%,rgba(255,255,255,.008) 100%),
    linear-gradient(0deg,transparent 0%,rgba(255,255,255,.003) 50%,transparent 100%);
  }
}

/* === Header — 暗房门牌 === */
.header{display:flex;align-items:baseline;gap:12px;margin-bottom:clamp(20px,4vw,32px);padding-bottom:14px;border-bottom:1px solid var(--border)}
.header h1{font-size:clamp(1.2rem,2.5vw,1.6rem);font-weight:700;letter-spacing:-.01em;color:var(--accent-glow)}
.header h1 span{font-weight:400;font-size:.7em;color:var(--text-muted);margin-left:6px;font-family:var(--font-mono);letter-spacing:.04em}
.header .sub{font-size:clamp(.68rem,1.2vw,.78rem);color:var(--text-muted);font-family:var(--font-mono);letter-spacing:.02em}
@media(max-width:480px){.header{flex-direction:column;align-items:flex-start;gap:4px}}

/* === Step Navigator — 胶片齿孔进度条 === */
.film-strip{display:flex;align-items:center;gap:0;margin-bottom:clamp(16px,3vw,24px)}
.film-frame{flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;position:relative}
.film-notch{width:14px;height:14px;border-radius:3px;background:var(--bg-card);border:1.5px solid var(--border);transition:all .35s var(--ease-out);position:relative}
.film-notch::after{content:'';position:absolute;inset:-3px;border-radius:5px;opacity:0;transform:scale(.8);transition:all .35s var(--ease-spring)}
.film-notch.active{background:var(--accent);border-color:var(--accent-glow);box-shadow:0 0 12px rgba(0,113,227,.35)}
.film-notch.active::after{border:1px solid rgba(0,113,227,.4);opacity:1;transform:scale(1)}
.film-notch.done{background:var(--success);border-color:var(--success);box-shadow:0 0 6px rgba(46,168,108,.25)}
.film-notch.secondary{background:var(--chrome-lt);border-color:var(--chrome-lt)}
.film-label{font-size:.62rem;color:var(--text-muted);letter-spacing:.03em;font-family:var(--font-sans);transition:color .3s}
.film-notch.active ~ .film-label,.film-notch.done ~ .film-label{color:var(--text-secondary)}
.film-notch.secondary ~ .film-label{color:var(--text-muted);opacity:.5}
.film-rail{flex:0 0 clamp(32px,8vw,60px);height:1px;background:var(--border);margin-bottom:20px;position:relative}
.film-rail.done{background:var(--accent-dark)}

/* === Upload Zone — 放大机投光台 === */
.upload-zone{
  background:var(--bg-surface);
  border:2px dashed rgba(0,113,227,.18);
  border-radius:var(--radius-input);
  padding:clamp(28px,6vw,44px) 24px;text-align:center;cursor:pointer;
  transition:all .3s var(--ease-out);
  touch-action:manipulation;user-select:none;-webkit-user-select:none;
  position:relative;overflow:hidden;
}
.upload-zone::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse at center,rgba(0,113,227,.04) 0%,transparent 70%);
  opacity:.5;transition:opacity .3s;
}
.upload-zone:hover,.upload-zone.drag-over{border-color:rgba(0,113,227,.4)}
.upload-zone:hover::before,.upload-zone.drag-over::before{opacity:1}
.upload-zone .zone-icon{
  width:48px;height:48px;margin:0 auto 12px;position:relative;
  display:flex;align-items:center;justify-content:center;
}
.upload-zone .zone-icon svg{width:40px;height:40px;fill:none;stroke:var(--accent-dark);stroke-width:1.2;transition:all .3s}
.upload-zone:hover .zone-icon svg{stroke:var(--accent);stroke-width:1.6}
.upload-zone .zone-icon::after{
  content:'';position:absolute;width:60px;height:60px;border-radius:50%;
  background:radial-gradient(circle,rgba(0,113,227,.1),transparent);
  opacity:0;transform:scale(.5);transition:all .4s var(--ease-spring);
}
.upload-zone:hover .zone-icon::after{opacity:1;transform:scale(1)}
.upload-zone .title{font-size:.9rem;font-weight:600;color:var(--text-primary);margin-bottom:6px}
.upload-zone .hint{font-size:.68rem;color:var(--text-muted);font-family:var(--font-mono)}
.upload-zone input{display:none}

.upload-actions{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-top:12px}

/* === Contact Sheet Grid — 接触印相 === */
.contact-sheet{display:grid;grid-template-columns:repeat(auto-fill,minmax(clamp(140px,30vw,200px),1fr));gap:var(--gap-unit)}
@media(min-width:768px){.contact-sheet{grid-template-columns:repeat(auto-fill,minmax(180px,1fr))}}

.print{background:var(--bg-card);border-radius:var(--radius-sm);overflow:hidden;box-shadow:var(--shadow-card);transition:all .3s var(--ease-out);cursor:pointer;position:relative}
.print:hover{transform:translateY(-2px);box-shadow:var(--shadow-loupe)}
.print .thumb-img{width:100%;aspect-ratio:4/3;object-fit:cover;display:block;background:var(--bg-surface)}
.print .print-meta{display:flex;justify-content:space-between;align-items:center;padding:6px 10px;font-size:.6rem;font-family:var(--font-mono);color:var(--text-muted)}

/* BEST 选中 — 锯齿切角 + 琥珀标记 */
.print.best{border:2px solid var(--accent);box-shadow:0 0 0 4px rgba(0,113,227,.15),var(--shadow-card)}
.print.best::before{
  content:'★';position:absolute;top:6px;right:6px;z-index:2;
  font-size:1rem;color:var(--accent-glow);
  filter:drop-shadow(0 0 4px rgba(0,113,227,.6));
  animation:bestPulse 2s var(--ease-spring) infinite;
}
.print.best::after{
  content:'';position:absolute;top:0;right:0;
  width:0;height:0;
  border-style:solid;
  border-width:0 22px 22px 0;
  border-color:transparent var(--accent) transparent transparent;
  z-index:1;opacity:.7;
}
@keyframes bestPulse{
  0%,100%{transform:scale(1);opacity:1}
  50%{transform:scale(1.2);opacity:.8}
}

/* 悬停放大镜波纹 */
.print .loupe-ripple{
  position:absolute;inset:0;pointer-events:none;z-index:3;
  background:radial-gradient(circle at center,transparent 40%,rgba(0,113,227,.08) 100%);
  opacity:0;transition:opacity .2s;
}
.print:hover .loupe-ripple{opacity:1}

/* === BEST 精选横幅 — 暗房重点照明 === */
.best-banner{
  background:linear-gradient(135deg,rgba(0,113,227,.12),rgba(0,113,227,.04));
  border:1px solid rgba(0,113,227,.2);
  border-radius:var(--radius-input);padding:clamp(14px,2.5vw,20px);
  margin-bottom:var(--spacing-lg);position:relative;overflow:hidden;
}
.best-banner::before{
  content:'';position:absolute;top:-50%;right:-20%;width:200px;height:200px;
  background:radial-gradient(circle,rgba(0,113,227,.06),transparent);
  pointer-events:none;
}
.best-header{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.best-badge{
  font-family:var(--font-mono);font-size:.58rem;font-weight:700;text-transform:uppercase;
  letter-spacing:.06em;background:var(--accent);color:var(--text-inverse);
  padding:3px 10px;border-radius:var(--radius-sm);
}
.best-body{display:flex;gap:clamp(10px,2vw,16px);align-items:center}
.best-thumb{
  width:clamp(100px,30vw,160px);aspect-ratio:4/3;object-fit:cover;
  border-radius:var(--radius-sm);border:1.5px solid rgba(255,255,255,.1);flex-shrink:0;
  box-shadow:0 4px 16px rgba(0,0,0,.4);
}
.best-info{flex:1;min-width:0}
.best-score{display:flex;align-items:baseline;gap:4px;margin-bottom:4px}
.best-score .num{font-size:2.2rem;font-weight:700;line-height:1;color:var(--accent-glow);font-family:var(--font-mono)}
.best-score .unit{font-size:.72rem;color:var(--text-muted);font-family:var(--font-mono)}
.best-why{font-size:.68rem;color:var(--text-secondary);line-height:1.6;margin-bottom:8px}
.best-dims{display:flex;flex-wrap:wrap;gap:5px}
.best-dim{
  font-size:.6rem;font-family:var(--font-mono);padding:3px 8px;border-radius:var(--radius-pill);
  background:rgba(0,113,227,.1);color:var(--accent-dark);white-space:nowrap;
  border:1px solid rgba(0,113,227,.12);
}
.best-dim.lead{background:rgba(0,113,227,.2);color:var(--accent);border-color:rgba(0,113,227,.25)}

/* === Secondary prints label === */
.others-label{
  font-size:.64rem;font-family:var(--font-mono);color:var(--text-muted);
  margin-bottom:8px;display:flex;align-items:center;gap:6px
}
.others-label::after{content:'';flex:1;height:1px;background:var(--border)}

/* === Compare view — 精密测量台 === */
.compare-panel{
  background:var(--bg-surface);border-radius:var(--radius-input);
  overflow:hidden;box-shadow:var(--shadow-card);
}
.compare-bar{
  display:flex;align-items:center;gap:8px;padding:10px 14px;
  border-bottom:1px solid var(--border);margin-bottom:0
}
.compare-bar .back-btn{
  background:transparent;border:none;color:var(--text-muted);font-size:1.2rem;
  cursor:pointer;padding:4px;line-height:1;transition:color .2s;touch-action:manipulation
}
.compare-bar .back-btn:hover{color:var(--accent)}
.compare-bar .label{font-size:.72rem;font-family:var(--font-mono);color:var(--text-muted)}
.compare-viewport{
  position:relative;width:100%;aspect-ratio:4/3;overflow:hidden;
  background:#000;user-select:none;-webkit-user-select:none;touch-action:none
}
.compare-viewport img{position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover}
.compare-viewport .after-img{clip-path:inset(0 0 0 50%)}

/* 金属导轨滑块 */
.rail-slider{
  position:absolute;top:0;bottom:0;width:4px;left:50%;transform:translateX(-50%);
  z-index:5;cursor:ew-resize;pointer-events:auto;
}
.rail-slider .rail-line{
  position:absolute;top:0;bottom:0;left:50%;transform:translateX(-50%);width:1.5px;
  background:linear-gradient(180deg,rgba(255,255,255,.5),rgba(255,255,255,.9),rgba(255,255,255,.5));
  box-shadow:0 0 6px rgba(0,0,0,.5);
}
.rail-slider .knurl{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  width:38px;height:38px;border-radius:50%;
  background:linear-gradient(135deg,#555,#3a3a42);
  box-shadow:inset 0 1px 0 rgba(255,255,255,.15),inset 0 -1px 0 rgba(0,0,0,.4),0 2px 8px rgba(0,0,0,.5);
  border:1.5px solid rgba(255,255,255,.1);
  display:flex;align-items:center;justify-content:center
}
.rail-slider .knurl::after{
  content:'↔';font-size:.65rem;color:rgba(255,255,255,.5);font-family:var(--font-sans)
}
.rail-slider .knurl::before{
  content:'';position:absolute;inset:-4px;border-radius:50%;
  background:rgba(0,113,227,.15);opacity:0;transition:opacity .2s
}
.rail-slider:active .knurl::before{opacity:1}
.compare-labels{display:flex;justify-content:space-between;padding:6px 12px;font-size:.58rem;font-family:var(--font-mono);color:var(--text-muted)}

/* === Enhancement toggles — 金属拨杆 === */
.toggle-row{display:flex;flex-wrap:wrap;gap:6px;padding:10px 14px;border-top:1px solid var(--border)}
.toggle-chip{
  display:flex;align-items:center;gap:6px;padding:7px 14px;border-radius:var(--radius-pill);
  border:1px solid var(--border);background:var(--bg-card);font-size:.66rem;font-family:var(--font-mono);
  color:var(--text-muted);cursor:pointer;transition:all .2s;touch-action:manipulation;min-height:36px;
  letter-spacing:.02em
}
.toggle-chip:hover{border-color:var(--accent-dark);color:var(--text-secondary)}
.toggle-chip.active{background:rgba(0,113,227,.12);border-color:rgba(0,113,227,.3);color:var(--accent)}
.toggle-chip .chip-dot{width:7px;height:7px;border-radius:2px;background:var(--chrome-lt);transition:all .2s}
.toggle-chip.active .chip-dot{background:var(--accent);box-shadow:0 0 6px rgba(0,113,227,.4)}

/* === Buttons === */
.btn-row{display:flex;gap:8px;flex-wrap:wrap}
.btn{
  flex:1;min-width:100px;padding:10px 16px;border-radius:var(--radius-md);font-size:.76rem;font-weight:600;
  border:none;cursor:pointer;transition:all .2s;text-align:center;
  touch-action:manipulation;letter-spacing:-.01em;font-family:var(--font-sans)
}
.btn:active{transform:scale(.96)}
.btn-primary{background:var(--accent);color:var(--text-inverse)}
.btn-primary:active{background:var(--accent-dark)}
.btn-outline{background:transparent;color:var(--text-secondary);border:1px solid var(--border)}
.btn-outline:hover{border-color:var(--accent-dark);color:var(--accent)}
.btn-ghost{flex:0;min-width:auto;background:transparent;border:1px solid var(--border);color:var(--text-muted);font-size:.66rem;padding:6px 12px;font-family:var(--font-mono)}

/* === Loading overlay — 暗房红灯闪烁 === */
.loading-overlay{
  display:none;position:fixed;inset:0;background:rgba(20,20,22,.92);
  z-index:100;flex-direction:column;align-items:center;justify-content:center;gap:14px
}
.loading-overlay.visible{display:flex}
.loading-lamp{width:40px;height:40px;border-radius:50%;background:radial-gradient(circle,rgba(0,113,227,.8),rgba(0,113,227,.2));
  animation:loadingPulse 1s ease-in-out infinite;box-shadow:0 0 28px rgba(0,113,227,.3)
}
@keyframes loadingPulse{0%,100%{opacity:.6;transform:scale(1)}50%{opacity:1;transform:scale(1.15)}}
.loading-text{font-size:.72rem;color:var(--text-secondary);font-family:var(--font-mono);letter-spacing:.04em}

/* === Toast — 胶片底边提示条 === */
.toast{
  position:fixed;bottom:max(24px,calc(env(safe-area-inset-bottom,0)+12px));left:50%;transform:translateX(-50%);
  background:var(--bg-card);border:1px solid var(--border);color:var(--text-secondary);
  padding:10px 20px;border-radius:var(--radius-pill);
  font-size:.68rem;font-family:var(--font-mono);z-index:999;
  opacity:0;transition:all .3s var(--ease-out);
  pointer-events:none;box-shadow:0 4px 16px rgba(0,0,0,.5)
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(-8px)}

/* === Footer note — 折叠 === */
.footnote-summary{
  list-style:none;font-size:.62rem;font-family:var(--font-mono);color:var(--text-muted);
  padding:6px 0;cursor:pointer;letter-spacing:.03em;
  display:flex;align-items:center;gap:4px;transition:color .2s
}
.footnote-summary:hover{color:var(--text-secondary)}
.note-block{
  background:var(--bg-surface);border-left:2px solid var(--accent-dark);border-radius:0 var(--radius-sm) var(--radius-sm) 0;
  padding:12px 14px;font-size:.68rem;color:var(--text-muted);line-height:1.6
}
.note-block b{color:var(--accent-dark);font-weight:600}

/* === Empty state === */
.empty-state{display:flex;flex-direction:column;align-items:center;gap:8px;padding:36px 0;color:var(--text-muted);font-size:.72rem;text-align:center;font-family:var(--font-mono)}

/* === Responsive === */
@media(min-width:768px){
  .app{padding:32px 40px}
}
@media(max-width:480px){
  .best-body{flex-direction:column;align-items:flex-start}
  .best-thumb{width:100%;aspect-ratio:16/9}
}
</style>
</head>
<body>

<!-- Loading -->
<div class="loading-overlay" id="loadingOverlay">
  <div class="loading-lamp"></div>
  <div class="loading-text">AI 正分析照片中…</div>
</div>

<div class="app">

  <!-- Header -->
  <div class="header">
    <h1>PixelPick <span>v1</span></h1>
    <div class="sub">PRECISION PHOTO SELECTOR</div>
  </div>

  <!-- Film strip navigator -->
  <div class="film-strip">
    <div class="film-frame"><span class="film-notch active" id="s1"></span><span class="film-label">上传</span></div>
    <div class="film-rail" id="r1"></div>
    <div class="film-frame"><span class="film-notch" id="s2"></span><span class="film-label">评分</span></div>
    <div class="film-rail" id="r2"></div>
    <div class="film-frame"><span class="film-notch" id="s3"></span><span class="film-label">对比</span></div>
  </div>

  <!-- STEP 1: Upload -->
  <div id="step1Section">
    <div class="upload-zone" id="uploadZone">
      <div class="zone-icon">
        <svg viewBox="0 0 40 40"><rect x="4" y="8" width="32" height="28" rx="3"/><circle cx="14" cy="18" r="4"/><path d="M8 32l8-10 6 7 5-6 9 11"/></svg>
      </div>
      <div class="title">拖拽或点击上传照片</div>
      <div class="hint">JPG / PNG / WebP · 每次 3~10 张 · 支持 Ctrl+V 粘贴</div>
    </div>

    <div class="upload-actions">
      <button class="btn btn-ghost" onclick="pickFolder()">选择文件夹</button>
      <button class="btn btn-ghost" onclick="loadDemo();return false" style="border-color:rgba(0,113,227,.3);color:var(--accent-dark)">使用演示数据</button>
    </div>

    <input type="file" id="fileInput" accept="image/*" multiple style="display:none">
    <input type="file" id="folderInput" webkitdirectory directory multiple style="display:none">

    <div class="contact-sheet" id="gallery" style="display:none"></div>
    <div class="empty-state" id="noPhotoHint">
      <div style="font-size:2rem;opacity:.3">[  ]</div>
      <span>拖拽 3~10 张照片即可开始</span>
    </div>
    <div class="btn-row" style="display:none" id="step1Actions">
      <button class="btn btn-outline" onclick="resetAll()">重新开始</button>
    </div>
  </div>

  <!-- STEP 2: Results -->
  <div id="step2Section" style="display:none">
    <div class="best-banner" id="bestBanner"></div>
    <div class="others-label" id="othersLabel"></div>
    <div class="contact-sheet" id="othersGrid"></div>
    <div class="btn-row" style="margin-top:14px">
      <button class="btn btn-outline" onclick="backToStep1()">返回</button>
      <button class="btn btn-outline" onclick="runAnalysis()">重新分析</button>
    </div>
  </div>

  <!-- STEP 3: Compare -->
  <div id="step3Section" style="display:none">
    <div class="compare-panel" id="comparePanel">
      <div class="compare-bar">
        <button class="back-btn" onclick="backToStep2()">←</button>
        <span class="label">对比</span>
      </div>
      <div class="compare-viewport" id="compareView">
        <img id="beforeImg" src="" alt="Original">
        <img class="after-img" id="afterImg" src="" alt="Enhanced">
        <div class="rail-slider" id="slider">
          <span class="rail-line"></span>
          <span class="knurl"></span>
        </div>
      </div>
      <div class="compare-labels"><span>原图</span><span>AI 增强</span></div>
      <div class="toggle-row">
        <button class="toggle-chip active" data-effect="denoise" onclick="toggleEffect(this)"><span class="chip-dot"></span>降噪</button>
        <button class="toggle-chip active" data-effect="sharpen" onclick="toggleEffect(this)"><span class="chip-dot"></span>锐化</button>
        <button class="toggle-chip active" data-effect="color" onclick="toggleEffect(this)"><span class="chip-dot"></span>色彩</button>
        <button class="toggle-chip" data-effect="brightness" onclick="toggleEffect(this)"><span class="chip-dot"></span>曝光</button>
      </div>
    </div>
    <div class="btn-row" style="margin-top:12px">
      <button class="btn btn-outline" onclick="screenshotCompare()">导出对比截图</button>
      <button class="btn btn-primary" onclick="resetAll()">重新选择</button>
    </div>
  </div>

  <!-- Footnote -->
  <details style="cursor:pointer;margin-top:var(--spacing-lg)">
    <summary class="footnote-summary">[ i ] PM 设计决策</summary>
    <div class="note-block">
    <b>产品思考：</b>AI 在用户上传照片后立即自动分析——减少一步点击就是减少一个流失节点。评分四维透明（清晰度/亮度/色彩/构图），信任先于采纳。增强效果可开关、可拖拽对比——用户不信任黑盒"美化"。核心命题：硬件捕捉原始信息、软件利用信息、AI 从已有信息中重建意义。
    </div>
  </details>

  <div class="toast" id="toast"></div>
</div>

<script>
/* ================================================================
   Application Logic (Preserved & Extended)
   ================================================================ */
let photos = [], analysisResults = [], currentStep = 1;

// Step navigation
function setStep(s){
  currentStep = s;
  ['step1Section','step2Section','step3Section'].forEach((id,i)=>{
    document.getElementById(id).style.display = s===i+1?'block':'none';
  });
  ['s1','s2','s3'].forEach((id,i)=>{
    const el = document.getElementById(id);
    el.classList.remove('active','done','secondary');
    if(i+1 < s) el.classList.add('done');
    if(i+1 === s) el.classList.add(s===3?'secondary':'active');
  });
  ['r1','r2'].forEach((id,i)=>{
    document.getElementById(id).classList.toggle('done', i+1 < s);
  });
}

// Upload — 点击上传区触发文件选择
document.getElementById('uploadZone').addEventListener('click',()=>document.getElementById('fileInput').click());
document.getElementById('fileInput').addEventListener('change',handleFiles);
const uz = document.getElementById('uploadZone');
uz.addEventListener('dragover',e=>{e.preventDefault();uz.classList.add('drag-over')});
uz.addEventListener('dragleave',()=>uz.classList.remove('drag-over'));
uz.addEventListener('drop',e=>{
  e.preventDefault();uz.classList.remove('drag-over');
  if(e.dataTransfer.files.length) handleFilesFromList(e.dataTransfer.files);
});

function handleFiles(e){handleFilesFromList(e.target.files)}
function handleFilesFromList(files){
  const valid = Array.from(files).filter(f=>f.type.startsWith('image/'));
  if(!valid.length){showToast('请选择图片文件');return}
  if(valid.length < 3){showToast('建议至少上传 3 张照片');}
  if(valid.length > 10){showToast('最多支持 10 张照片');valid.length = 10}
  photos=[];analysisResults=[];
  ['gallery','bestBanner','othersGrid','othersLabel','step1Actions','step2Section','step3Section'].forEach(id=>{
    document.getElementById(id).style.display = id==='othersLabel'?'none':'none';
    if(id==='gallery'||id==='bestBanner'||id==='othersGrid') document.getElementById(id).innerHTML='';
  });
  let loaded = 0;
  valid.forEach((f,i)=>{
    const reader = new FileReader();
    reader.onload = e => {
      photos.push({src:e.target.result, name:f.name, idx:i});
      loaded++;
      if(loaded === valid.length){
        renderContactSheet();
        if(photos.length >= 2) runAnalysis();
      }
    };
    reader.readAsDataURL(f);
  });
}

function renderContactSheet(){
  const g = document.getElementById('gallery');
  g.innerHTML = photos.map((p,i)=>`<div class="print" data-idx="${i}" onclick="removePhoto(${i})" title="点击移除"><span class="loupe-ripple"></span><img class="thumb-img" src="${p.src}" alt=""><div class="print-meta"><span>#${i+1}</span><span>${p.name.slice(0,12)||'未命名'}</span></div></div>`).join('');
  g.style.display = 'grid';
  document.getElementById('noPhotoHint').style.display = photos.length?'none':'flex';
  document.getElementById('step1Actions').style.display = photos.length?'flex':'none';
}

function removePhoto(idx){
  photos.splice(idx,1);photos.forEach((p,i)=>p.idx=i);
  renderContactSheet();
  if(!photos.length){
    document.getElementById('step1Actions').style.display='none';
    document.getElementById('noPhotoHint').style.display='flex';
  }
}

// Paste
document.addEventListener('paste',e=>{
  const items = e.clipboardData?.items; if(!items) return;
  const imageFiles = [];
  for(const item of items){if(item.type.startsWith('image/')) imageFiles.push(item.getAsFile())}
  if(imageFiles.length){e.preventDefault();handleFilesFromList(imageFiles);showToast('已粘贴 '+imageFiles.length+' 张照片')}
});

// Folder picker
function pickFolder(){
  const input = document.getElementById('folderInput');input.value='';
  input.addEventListener('change',function h(){input.removeEventListener('change',h);handleFilesFromList(input.files)},{once:true});
  input.click();
}

// Demo data — generates 5 synthetic sample images with varied visual characteristics
function loadDemo(){
  generateDemoImages().then(files => {
    handleFilesFromList(files);
  });
}

function generateDemoImages(){
  const configs = [
    { label:'风景',     bg:'#3a6b8c', fg:'#e8d5a3', shape:'mountains', blur:0,   sat:1.3, exp:0.95 },
    { label:'人像',     bg:'#5c4a3a', fg:'#d4a88c', shape:'portrait', blur:1.2, sat:1.0, exp:0.75 },
    { label:'微距',     bg:'#2a4a2a', fg:'#8cc88c', shape:'flower',   blur:0,   sat:1.6, exp:1.05 },
    { label:'街景',     bg:'#5a5a6a', fg:'#c8c0b8', shape:'buildings',blur:0.6,sat:0.8, exp:0.85 },
    { label:'日落',     bg:'#8c4a2a', fg:'#f0c060', shape:'sun',      blur:0,   sat:1.5, exp:0.70 },
    { label:'夜景',     bg:'#121828', fg:'#f8e848', shape:'stars',    blur:0,   sat:0.6, exp:0.35 },
    { label:'虚化',     bg:'#3a5a3a', fg:'#e0f0c0', shape:'circles',  blur:0,   sat:1.1, exp:1.10 },
  ];

  return Promise.all(configs.map((cfg,i) => {
    const canvas = document.createElement('canvas');
    canvas.width = 600; canvas.height = 450;
    const ctx = canvas.getContext('2d');

    // Base background
    ctx.fillStyle = cfg.bg; ctx.fillRect(0,0,600,450);

    // Add grain texture
    const imgData = ctx.getImageData(0,0,600,450);
    for(let j=0;j<imgData.data.length;j+=4){
      const noise = (Math.random()-0.5)*18;
      imgData.data[j]+=noise; imgData.data[j+1]+=noise; imgData.data[j+2]+=noise;
    }
    ctx.putImageData(imgData,0,0);

    // Draw shape content
    ctx.fillStyle = cfg.fg;
    ctx.globalAlpha = 0.85;

    if(cfg.shape==='mountains'){
      ctx.beginPath(); ctx.moveTo(0,450);
      ctx.lineTo(0,280); ctx.lineTo(120,200); ctx.lineTo(240,260);
      ctx.lineTo(380,160); ctx.lineTo(480,240); ctx.lineTo(600,180);
      ctx.lineTo(600,450); ctx.fill();
      // Snow caps
      ctx.fillStyle = '#fff'; ctx.globalAlpha = 0.4;
      ctx.beginPath(); ctx.moveTo(350,190); ctx.lineTo(380,160); ctx.lineTo(410,200); ctx.fill();
    }
    else if(cfg.shape==='portrait'){
      ctx.beginPath(); ctx.arc(300,220,120,0,Math.PI*2); ctx.fill();
      ctx.fillStyle = cfg.bg; ctx.globalAlpha = 0.3;
      ctx.beginPath(); ctx.arc(300,200,40,0,Math.PI*2); ctx.fill();
    }
    else if(cfg.shape==='flower'){
      const cx=300,cy=220;
      for(let a=0;a<Math.PI*2;a+=Math.PI/4){
        ctx.beginPath(); ctx.ellipse(cx+Math.cos(a)*40,cy+Math.sin(a)*40,28,18,a,0,Math.PI*2); ctx.fill();
      }
      ctx.fillStyle = '#f0c040'; ctx.globalAlpha = 0.7;
      ctx.beginPath(); ctx.arc(cx,cy,18,0,Math.PI*2); ctx.fill();
    }
    else if(cfg.shape==='buildings'){
      const bw=60,colors=['#c8c0b8','#b0a8a0','#d0c8c0','#a8a098'];
      for(let x=20;x<580;x+=bw+8){
        const h=200+Math.random()*160;
        ctx.fillStyle=colors[Math.floor(Math.random()*4)];
        ctx.fillRect(x,450-h,bw,h);
        // Windows
        ctx.fillStyle=cfg.bg; ctx.globalAlpha=0.5;
        for(let wy=450-h+20;wy<440;wy+=22)
          for(let wx=x+8;wx<x+bw-8;wx+=14)
            ctx.fillRect(wx,wy,8,10);
        ctx.fillStyle=cfg.fg; ctx.globalAlpha=0.85;
      }
    }
    else if(cfg.shape==='sun'){
      const grd=ctx.createRadialGradient(300,240,20,300,240,140);
      grd.addColorStop(0,'#fff8e0'); grd.addColorStop(0.4,cfg.fg); grd.addColorStop(1,cfg.bg);
      ctx.fillStyle=grd; ctx.globalAlpha=0.9;
      ctx.beginPath(); ctx.arc(300,240,140,0,Math.PI*2); ctx.fill();
    }
    else if(cfg.shape==='stars'){
      ctx.fillStyle='#fff'; ctx.globalAlpha=0.9;
      for(let s=0;s<80;s++){
        const sx=Math.random()*600,sy=Math.random()*350,sr=1+Math.random()*2.5;
        ctx.beginPath(); ctx.arc(sx,sy,sr,0,Math.PI*2); ctx.fill();
      }
      // Moon
      ctx.fillStyle='#f8e848'; ctx.globalAlpha=0.8;
      ctx.beginPath(); ctx.arc(460,80,50,0,Math.PI*2); ctx.fill();
    }
    else if(cfg.shape==='circles'){
      for(let c=0;c<30;c++){
        const cx2=Math.random()*600,cy2=Math.random()*450,cr=15+Math.random()*45;
        ctx.fillStyle=cfg.fg; ctx.globalAlpha=0.15+Math.random()*0.3;
        ctx.beginPath(); ctx.arc(cx2,cy2,cr,0,Math.PI*2); ctx.fill();
      }
    }
    ctx.globalAlpha = 1;

    // Apply blur via secondary canvas if needed
    if(cfg.blur > 0){
      const blurCanvas = document.createElement('canvas');
      blurCanvas.width=600; blurCanvas.height=450;
      const bctx = blurCanvas.getContext('2d');
      bctx.filter = `blur(${cfg.blur}px)`;
      bctx.drawImage(canvas,0,0);
      ctx.clearRect(0,0,600,450); ctx.drawImage(blurCanvas,0,0);
    }

    // Apply saturation & exposure
    ctx.globalCompositeOperation = 'saturation';
    ctx.fillStyle = `rgba(128,128,128,${cfg.sat-1})`;
    ctx.fillRect(0,0,600,450);
    ctx.globalCompositeOperation = 'source-over';
    ctx.fillStyle = `rgba(0,0,0,${1-cfg.exp})`;
    ctx.fillRect(0,0,600,450);

    // Label
    ctx.font = 'bold 20px monospace'; ctx.fillStyle = 'rgba(255,255,255,.5)';
    ctx.textAlign = 'right'; ctx.fillText(`第${i+1}张 ${cfg.label}`,580,40);

    return new Promise(resolve => {
      canvas.toBlob(blob => {
        const file = new File([blob], `演示_${i+1}_${cfg.label}.png`, {type:'image/png'});
        resolve(file);
      },'image/png');
    });
  }));
}

// AI Analysis
function runAnalysis(){
  if(photos.length < 2){showToast('至少需要 2 张照片');return}
  document.getElementById('loadingOverlay').classList.add('visible');
  const promises = photos.map(p=>new Promise(resolve=>{
    const img = new Image();
    img.onload = ()=>{const score=analyzeImage(img);analysisResults=[...analysisResults.filter(r=>r.idx!==p.idx),{...score,src:p.src,idx:p.idx}];resolve();};
    img.src = p.src;
  }));
  Promise.all(promises).then(()=>{
    document.getElementById('loadingOverlay').classList.remove('visible');
    analysisResults.sort((a,b)=>a.idx-b.idx);
    const best = analysisResults.reduce((a,b)=>b.total>a.total?b:a, analysisResults[0]);
    analysisResults.forEach(r=>r.isBest = r.idx===best.idx);
    renderResults();
    setStep(2);
    showToast('已选出最佳照片');
  });
}

function analyzeImage(img){
  const canvas=document.createElement('canvas'),ctx=canvas.getContext('2d');
  const w=Math.min(img.width,200),h=Math.round(img.height*(w/img.width));
  canvas.width=w;canvas.height=h;ctx.drawImage(img,0,0,w,h);
  const data=ctx.getImageData(0,0,w,h).data;
  // Clarity
  let lumVals=[];
  for(let i=0;i<data.length;i+=4) lumVals.push(.299*data[i]+.587*data[i+1]+.114*data[i+2]);
  const mean=lumVals.reduce((a,b)=>a+b,0)/lumVals.length;
  const std=Math.sqrt(lumVals.reduce((s,v)=>s+(v-mean)**2,0)/lumVals.length);
  const clarity=Math.min(100,Math.round(std*1.2));
  // Brightness
  const brightness=Math.min(100,Math.round((mean/255)*100));
  // Color
  let hues=[];
  for(let i=0;i<data.length;i+=16){
    const r=data[i],g=data[i+1],b=data[i+2];
    if(Math.max(r,g,b)-Math.min(r,g,b)>30) hues.push(Math.atan2(Math.sqrt(3)*(g-b),2*r-g-b));
  }
  const colorRichness=Math.min(100,Math.round(hues.length/(w*h/16)*800));
  // Composition
  const cw=Math.floor(w/3),ch=Math.floor(h/3);
  let cL=0,eL=0,cC=0,eC=0;
  const cx=Math.floor(w/2),cy=Math.floor(h/2);
  for(let y=0;y<h;y++)for(let x=0;x<w;x++){
    const idx=(y*w+x)*4;
    const lum=.299*data[idx]+.587*data[idx+1]+.114*data[idx+2];
    if(x>cx-cw/2&&x<cx+cw/2&&y>cy-ch/2&&y<cy+ch/2){cL+=lum;cC++}else{eL+=lum;eC++}
  }
  const cA=cL/Math.max(1,cC),eA=eL/Math.max(1,eC);
  const separation=Math.abs(cA-eA);
  const compScore=Math.min(90,Math.round(40+separation*.25+(clarity>55?12:0)));
  const scores={clarity:clamp(clarity,30,95),brightness:clamp(brightness,40,92),colorRichness:clamp(colorRichness,25,90),composition:clamp(compScore,30,90)};
  scores.total=Math.round(scores.clarity*.35+scores.brightness*.1+scores.colorRichness*.2+scores.composition*.35);
  return scores;
}
function clamp(v,min,max){return Math.max(min,Math.min(max,v))}

function renderResults(){
  const all=analysisResults;
  const best=all.find(r=>r.isBest);
  const others=all.filter(r=>!r.isBest);
  const avg=(arr,key)=>arr.reduce((s,r)=>s+r[key],0)/arr.length;
  const bestReasons=[];
  if(best.clarity>=avg(all,'clarity')) bestReasons.push('清晰度最高');
  if(best.brightness>=avg(all,'brightness')) bestReasons.push('曝光最佳');
  if(best.colorRichness>=avg(all,'colorRichness')) bestReasons.push('色彩最丰富');
  if(best.composition>=avg(all,'composition')) bestReasons.push('构图最佳');
  const why=bestReasons.length?bestReasons.slice(0,3).join(' · '):'综合得分最高';

  // BEST banner
  document.getElementById('bestBanner').innerHTML=`
    <div class="best-header"><span class="best-badge">最佳</span><span style="font-size:.68rem;color:var(--text-muted);font-family:var(--font-sans)">从 ${all.length} 张照片中选出</span></div>
    <div class="best-body">
      <img class="best-thumb" src="${best.src}" alt="">
      <div class="best-info">
        <div class="best-score"><span class="num">${best.total}</span><span class="unit">/100 · 综合评分</span></div>
        <div class="best-why">${why}</div>
        <div class="best-dims">
          ${['清晰度','亮度','色彩','构图'].map((label,i)=>{
            const k=['clarity','brightness','colorRichness','composition'][i];
            const v=best[k];const lead=v>=avg(all,k);
            return `<span class="best-dim${lead?' lead':''}">${label} ${v}</span>`;
          }).join('')}
        </div>
      </div>
    </div>
    <button class="btn btn-primary" style="margin-top:12px;width:100%" onclick="goToCompare()">对比 · 原图 vs AI 增强</button>
  `;
  document.getElementById('bestBanner').style.display='block';

  // Others grid
  if(others.length){
    document.getElementById('othersLabel').innerHTML=`<span>其他照片 (${others.length}张)</span>`;
    document.getElementById('othersLabel').style.display='flex';
  }
  document.getElementById('othersGrid').innerHTML=others.map(r=>{
    const idx=all.indexOf(r);
    return `<div class="print" onclick="previewCompare(${idx})"><span class="loupe-ripple"></span><img class="thumb-img" src="${r.src}" alt=""><div class="print-meta"><span>${r.total} 分</span></div></div>`;
  }).join('');
  document.getElementById('othersGrid').style.display='grid';

  document.getElementById('beforeImg').src=best.src;
  applyEnhancement();
}

// Compare slider
let sliderDragging=false,sliderInited=false;
function goToCompare(){setStep(3);initSlider()}
function previewCompare(idx){
  const r=analysisResults[idx];
  document.getElementById('beforeImg').src=r.src;
  applyEnhancement();setStep(3);initSlider();
}
function initSlider(){
  const view=document.getElementById('compareView');
  const slider=document.getElementById('slider');
  const after=view.querySelector('.after-img');
  function update(clientX){
    const rect=view.getBoundingClientRect();
    let pct=((clientX-rect.left)/rect.width)*100;
    pct=Math.max(5,Math.min(95,pct));
    slider.style.left=pct+'%';
    after.style.clipPath=`inset(0 0 0 ${pct}%)`;
  }
  view.onpointerdown=e=>{sliderDragging=true;view.setPointerCapture(e.pointerId);update(e.clientX)};
  view.onpointermove=e=>{if(sliderDragging) update(e.clientX)};
  view.onpointerup=()=>sliderDragging=false;
  // 确保 touch listeners 只注册一次，避免每次进 Step3 重复叠加
  if(!sliderInited){
    sliderInited=true;
    view.addEventListener('touchstart',e=>{sliderDragging=true;update(e.touches[0].clientX)},{passive:false});
    view.addEventListener('touchmove',e=>{if(sliderDragging){e.preventDefault();update(e.touches[0].clientX)}},{passive:false});
    view.addEventListener('touchend',()=>sliderDragging=false);
  }
}

// Enhancement
const activeEffects = new Set(['denoise','sharpen','color']);
function toggleEffect(btn){
  const ef=btn.dataset.effect;
  if(activeEffects.has(ef)) activeEffects.delete(ef); else activeEffects.add(ef);
  btn.classList.toggle('active');applyEnhancement();
}
function applyEnhancement(){
  const after=document.getElementById('afterImg');
  const canvas=document.createElement('canvas'),ctx=canvas.getContext('2d');
  const img=new Image();
  img.onload=()=>{
    canvas.width=img.width;canvas.height=img.height;
    let f=[];ctx.filter='';
    if(activeEffects.has('denoise')) f.push('contrast(1.05)');
    if(activeEffects.has('sharpen')) f.push('brightness(1.03)');
    if(activeEffects.has('color')) f.push('saturate(1.2)');
    if(activeEffects.has('brightness')) f.push('brightness(1.15)');
    ctx.filter=f.join(' ');ctx.drawImage(img,0,0);
    after.src=canvas.toDataURL('image/jpeg',.9);
  };
  img.src=document.getElementById('beforeImg').src;
}

// Screenshot
function screenshotCompare(){
  const view=document.getElementById('compareView');
  const slider=view.querySelector('.rail-slider');slider.style.display='none';
  const before=document.getElementById('beforeImg'),after=document.getElementById('afterImg');
  const canvas=document.createElement('canvas');
  canvas.width=before.naturalWidth||view.offsetWidth;
  canvas.height=before.naturalHeight||view.offsetHeight;
  const ctx=canvas.getContext('2d'),hw=canvas.width/2;
  ctx.drawImage(before,0,0,hw,canvas.height,0,0,hw,canvas.height);
  ctx.drawImage(after,hw,0,hw,canvas.height,hw,0,hw,canvas.height);
  ctx.strokeStyle='#fff';ctx.lineWidth=3;ctx.beginPath();ctx.moveTo(hw,0);ctx.lineTo(hw,canvas.height);ctx.stroke();
  ctx.font='bold 13px monospace';ctx.fillStyle='#000';ctx.fillText('原图',8,20);ctx.fillStyle='#fff';ctx.fillText('AI 增强',hw+8,20);
  canvas.toBlob(blob=>{
    slider.style.display='';const url=URL.createObjectURL(blob);
    const a=document.createElement('a');a.href=url;a.download='pixelpick_对比.png';a.click();URL.revokeObjectURL(url);
    showToast('截图已保存');
  },'image/png');
}

// Navigation
function backToStep1(){setStep(1)}
function backToStep2(){setStep(2)}
function resetAll(){
  photos=[];analysisResults=[];
  ['gallery','bestBanner','othersGrid'].forEach(id=>{document.getElementById(id).innerHTML='';document.getElementById(id).style.display='none'});
  document.getElementById('othersLabel').style.display='none';
  document.getElementById('step1Actions').style.display='none';
  document.getElementById('noPhotoHint').style.display='flex';
  document.getElementById('fileInput').value='';
  setStep(1);
}

// Toast
let toastTimer;
function showToast(msg){
  const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
  clearTimeout(toastTimer);toastTimer=setTimeout(()=>t.classList.remove('show'),1800);
}

// Init
setStep(1);
</script>
</body>
</html>
